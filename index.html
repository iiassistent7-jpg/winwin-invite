<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Win-Win Network</title>

  <meta name="description" content="Recommend businesses to friends and earn automatically" />
  <meta property="og:title" content="Win-Win Network" />
  <meta property="og:description" content="Everyone wins. Recommend. Earn. Grow." />
  <meta property="og:image" content="https://invite.winwinnetwork.pro/preview.png" />
  <meta property="og:url" content="https://invite.winwinnetwork.pro/" />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#6c63ff" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    :root {
      --bg-1: #0a0a0f;
      --bg-2: #1a1a2e;
      --accent-1: #6c63ff;
      --accent-2: #00d4aa;
      --text-main: #ffffff;
      --text-muted: #a0a0b0;
      --card: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.08);
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      --max-width: 480px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 20% 20%, rgba(108, 99, 255, 0.14), transparent 35%),
        radial-gradient(circle at 80% 10%, rgba(0, 212, 170, 0.12), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2), #111122, var(--bg-1));
      background-size: 180% 180%;
      animation: bgShift 15s ease infinite;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      overflow-x: hidden;
    }

    body.rtl { direction: rtl; }

    @keyframes bgShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .shell {
      width: 100%;
      max-width: var(--max-width);
      opacity: 0;
      transform: translateY(12px);
      animation: pageIn 0.6s var(--ease-out) forwards;
    }

    @keyframes pageIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .panel {
      position: relative;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 24px 22px 20px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(108,99,255,0.4), rgba(0,212,170,0.18), rgba(255,255,255,0.05));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* КНОПКИ ЯЗЫКА */
    .lang-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .lang-btn {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 999px;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
      white-space: nowrap;
    }

    .lang-btn:hover,
    .lang-btn.active {
      background: linear-gradient(135deg, rgba(108,99,255,0.3), rgba(0,212,170,0.2));
      border-color: rgba(108,99,255,0.5);
      color: var(--text-main);
    }

    /* ШАПКА */
    .header {
      text-align: center;
      margin-bottom: 16px;
    }

    .invited-text {
      margin: 0 0 4px;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .logo {
      margin: 0;
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .logo-sub {
      display: inline-block;
      margin-top: 6px;
      font-size: 0.83rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* HERO */
    .hero {
      text-align: center;
      margin-bottom: 24px;
    }

    .hero-subtitle {
      margin: 0 0 10px;
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .hero-slogan {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.01em;
    }

    /* QR БЛОК */
    .qr-section {
      text-align: center;
      margin-bottom: 20px;
    }

    .qr-hint {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .qr-wrap {
      display: flex;
      justify-content: center;
    }

    .qr-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 16px;
      box-shadow:
        0 4px 32px rgba(108, 99, 255, 0.28),
        0 0 0 1px rgba(108, 99, 255, 0.15);
      display: inline-block;
    }

    #qrcode canvas,
    #qrcode img {
      display: block;
      border-radius: 6px;
    }

    /* ФУТЕР */
    .footer {
      text-align: center;
      margin-top: 20px;
      color: var(--text-muted);
    }
    .footer .copyright { font-size: 0.84rem; margin-bottom: 4px; }
    .footer .note      { font-size: 0.72rem; opacity: 0.9; }

    @media (max-width: 640px) {
      .panel { padding: 20px 16px 18px; border-radius: 24px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">

      <div class="lang-bar" role="group" aria-label="Language">
        <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
        <button class="lang-btn" data-lang="he">🇮🇱 עב</button>
        <button class="lang-btn" data-lang="ar">🇸🇦 عر</button>
        <button class="lang-btn" data-lang="ru">🇷🇺 РУ</button>
      </div>

      <header class="header">
        <p class="invited-text" id="invited">Вас пригласили в</p>
        <h1 class="logo">Win-Win</h1>
        <div class="logo-sub">Network</div>
      </header>

      <section class="hero">
        <p class="hero-subtitle" id="subtitle">Рекомендуйте бизнесы друзьям и зарабатывайте автоматически</p>
        <p class="hero-slogan" id="slogan">Выигрывают все</p>
      </section>

      <section class="qr-section">
        <p class="qr-hint" id="qrHint">Если человек рядом — покажи этот QR<br>для сканирования</p>
        <div class="qr-wrap">
          <div class="qr-card">
            <div id="qrcode"></div>
          </div>
        </div>
      </section>

      <footer class="footer">
        <div class="copyright">Win-Win Network © 2025</div>
        <div class="note" id="footerNote">Бесплатно для агентов • Эффективно для бизнеса</div>
      </footer>

    </section>
  </main>

  <script>
    (function () {
      "use strict";

      const TEXTS = {
        en: {
          dir: "ltr", htmlLang: "en",
          invited:  "Invitation",
          subtitle: "Recommend businesses to friends",
          slogan:   "Here everyone wins",
          qrHint:   "If the person is nearby — show them this QR\nfor scanning",
          footer:   "Free for agents \u2022 Effective for businesses"
        },
        he: {
          dir: "rtl", htmlLang: "he",
          invited:  "\u05d4\u05d6\u05de\u05e0\u05d4",
          subtitle: "\u05d4\u05de\u05dc\u05d9\u05e6\u05d5 \u05e2\u05dc \u05e2\u05e1\u05e7\u05d9\u05dd \u05dc\u05d7\u05d1\u05e8\u05d9\u05dd",
          slogan:   "\u05db\u05d0\u05df \u05db\u05d5\u05dc\u05dd \u05de\u05e8\u05d5\u05d5\u05d9\u05d7\u05d9\u05dd",
          qrHint:   "\u05d0\u05dd \u05d4\u05d0\u05d3\u05dd \u05dc\u05d9\u05d3\u05da \u2014 \u05d4\u05e8\u05d0\u05d4 \u05dc\u05d5 \u05d0\u05ea \u05d4-QR\n\u05dc\u05e1\u05e8\u05d9\u05e7\u05d4",
          footer:   "\u05d7\u05d9\u05e0\u05dd \u05dc\u05e1\u05d5\u05db\u05e0\u05d9\u05dd \u2022 \u05d9\u05e2\u05d9\u05dc \u05dc\u05e2\u05e1\u05e7\u05d9\u05dd"
        },
        ar: {
          dir: "rtl", htmlLang: "ar",
          invited:  "\u062f\u0639\u0648\u0629",
          subtitle: "\u0623\u0648\u0635\u0650 \u0628\u0627\u0644\u0623\u0639\u0645\u0627\u0644 \u0644\u0644\u0623\u0635\u062f\u0642\u0627\u0621",
          slogan:   "\u0647\u0646\u0627 \u0627\u0644\u062c\u0645\u064a\u0639 \u064a\u0631\u0628\u062d",
          qrHint:   "\u0625\u0630\u0627 \u0643\u0627\u0646 \u0627\u0644\u0634\u062e\u0635 \u0628\u0627\u0644\u0642\u0631\u0628 \u2014 \u0623\u0631\u0647 \u0647\u0630\u0627 \u0627\u0644\u0631\u0645\u0632\n\u0644\u0644\u0645\u0633\u062d",
          footer:   "\u0645\u062c\u0627\u0646\u064a \u0644\u0644\u0648\u0643\u0644\u0627\u0621 \u2022 \u0641\u0639\u0651\u0627\u0644 \u0644\u0644\u0623\u0639\u0645\u0627\u0644"
        },
        ru: {
          dir: "ltr", htmlLang: "ru",
          invited:  "\u041f\u0440\u0438\u0433\u043b\u0430\u0448\u0435\u043d\u0438\u0435",
          subtitle: "\u0420\u0435\u043a\u043e\u043c\u0435\u043d\u0434\u0443\u0439\u0442\u0435 \u0431\u0438\u0437\u043d\u0435\u0441\u044b \u0434\u0440\u0443\u0437\u044c\u044f\u043c",
          slogan:   "\u0417\u0434\u0435\u0441\u044c \u0432\u044b\u0438\u0433\u0440\u044b\u0432\u0430\u044e\u0442 \u0432\u0441\u0435",
          qrHint:   "\u0415\u0441\u043b\u0438 \u0447\u0435\u043b\u043e\u0432\u0435\u043a \u0440\u044f\u0434\u043e\u043c \u2014 \u043f\u043e\u043a\u0430\u0436\u0438\u0442\u0435 \u044d\u0442\u043e\u0442 QR\n\u0434\u043b\u044f \u0441\u043a\u0430\u043d\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f",
          footer:   "\u0411\u0435\u0441\u043f\u043b\u0430\u0442\u043d\u043e \u0434\u043b\u044f \u0430\u0433\u0435\u043d\u0442\u043e\u0432 \u2022 \u042d\u0444\u0444\u0435\u043a\u0442\u0438\u0432\u043d\u043e \u0434\u043b\u044f \u0431\u0438\u0437\u043d\u0435\u0441\u0430"
        }
      };

      function detectLang() {
        const n = navigator.language || "";
        if (n.startsWith("he") || n.startsWith("iw")) return "he";
        if (n.startsWith("ar")) return "ar";
        if (n.startsWith("ru") || n.startsWith("uk") || n.startsWith("be")) return "ru";
        return "en";
      }

      function applyLang(lang) {
        const t = TEXTS[lang] || TEXTS.en;
        document.documentElement.lang = t.htmlLang;
        document.body.dir = t.dir;
        document.body.classList.toggle("rtl", t.dir === "rtl");

        document.getElementById("invited").textContent    = t.invited;
        document.getElementById("subtitle").textContent   = t.subtitle;
        document.getElementById("slogan").textContent     = t.slogan;
        document.getElementById("qrHint").innerHTML       = t.qrHint.replace("\n", "<br>");
        document.getElementById("footerNote").textContent = t.footer;

        document.querySelectorAll(".lang-btn").forEach(btn => {
          btn.classList.toggle("active", btn.dataset.lang === lang);
        });
      }

      // Параметр ref → ссылка для QR
      // type=invite: агент приглашает нового человека на платформу
      // QR ведёт в TG бота с параметром client_SENDER (только sender, без receiver)
      const ref = new URLSearchParams(window.location.search).get("ref");
      const tgLink = ref
        ? "https://t.me/winwin_lead_bot?start=client_" + encodeURIComponent(ref.trim())
        : "https://t.me/winwin_lead_bot";

      // Генерируем QR
      new QRCode(document.getElementById("qrcode"), {
        text: tgLink,
        width: 240,
        height: 240,
        colorDark: "#0a0a1a",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H,
      });

      document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.addEventListener("click", () => applyLang(btn.dataset.lang));
      });

      applyLang(detectLang());
    })();
  </script>
</body>
</html>
