<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win-Win · Бизнес Кабинет</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ── Light theme ────────────────────────────────────────────── */
        :root {
            --bg:#F7F7F9; --surface:#FFFFFF; --surface2:#F2F2F5;
            --text:#1A1A2E; --text2:#8A8D9F; --border:rgba(0,0,0,0.06);
            --shadow:0 4px 20px rgba(0,0,0,0.06); --shadow2:0 8px 32px rgba(0,0,0,0.12);
            --accent1:#56CCF2; --accent2:#2F80ED; --green:#27AE60;
            --gold:#F2C94C; --red:#EB5757; --purple:#9B51E0; --radius:20px; --nav-bg:rgba(255,255,255,0.82);
        }
        /* ── Brand dark theme ───────────────────────────────────────── */
        body.brand-theme {
            --bg:#0F0F1A; --surface:rgba(255,255,255,0.04); --surface2:rgba(255,255,255,0.07);
            --text:#FFFFFF; --text2:#A0A0B0; --border:rgba(255,255,255,0.07);
            --shadow:0 4px 24px rgba(0,0,0,0.35); --shadow2:0 8px 40px rgba(0,0,0,0.55);
            --nav-bg:rgba(15,15,26,0.85);
        }

        /* ── Reset & Base ───────────────────────────────────────────── */
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { -webkit-text-size-adjust:100%; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; transition: background .3s, color .3s; overscroll-behavior: none; }
        
        /* ── RTL Support ────────────────────────────────────────────── */
        [dir="rtl"] { text-align: right; }
        [dir="rtl"] .header-right { flex-direction: row-reverse; }
        [dir="rtl"] .btn-back i { transform: rotate(180deg); }
        [dir="rtl"] .f-val { text-align: left; }
        [dir="rtl"] .receipt-line { flex-direction: row-reverse; }
        [dir="rtl"] .prof-val { text-align: left; }
        [dir="rtl"] .lb-agent-earned { text-align: left; }

        .app { width:100%; max-width:430px; min-height:100vh; position:relative; padding-bottom:90px; overflow-x:hidden; }

        /* ── Loader & Expired Session ───────────────────────────────── */
        .loading-overlay { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition:opacity .4s; }
        .loader-brand { font-family:'Sora',sans-serif; font-size:2rem; font-weight:800; background:linear-gradient(90deg,var(--accent1),var(--accent2)); -webkit-background-clip:text; color:transparent; margin-bottom:8px; }
        .loader-sub { font-size:.82rem; color:var(--text2); margin-bottom:32px; font-weight:600; }
        .spinner { border: 4px solid rgba(86,204,242,0.1); border-left-color: var(--accent1); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .loader-err { display:none; text-align:center; padding:0 24px; width: 100%; max-width: 430px; }
        .loader-err-title { font-family:'Sora',sans-serif; font-size:1.3rem; font-weight:800; color:var(--red); margin-bottom:12px; }
        .loader-err-sub { font-size:.9rem; color:var(--text2); margin-bottom:28px; line-height: 1.5; font-weight: 500; }

        /* ── Header ─────────────────────────────────────────────────── */
        .header { display:flex; align-items:center; justify-content:space-between; padding:24px 20px 12px; position:sticky; top:0; background:var(--bg); z-index:50; }
        .header-left .logo-text { font-family:'Sora',sans-serif; font-size:1.3rem; font-weight:800; background:linear-gradient(90deg,var(--accent1),var(--accent2)); -webkit-background-clip:text; color:transparent; margin-bottom:2px;}
        .header-left .company-name { font-size:.85rem; color:var(--text); font-weight:600; }
        .header-right { display:flex; align-items:center; gap:8px; }
        .lang-row { display:flex; gap:4px; }
        .lang-btn { padding:4px 7px; border-radius:8px; font-size:.65rem; font-weight:700; border:1px solid var(--border); background:transparent; color:var(--text2); cursor:pointer; transition:.2s; }
        .lang-btn.active { background:var(--accent2); color:#fff; border-color:var(--accent2); }
        .icon-btn { width:40px; height:40px; border-radius:50%; background:var(--surface); border:1px solid var(--border); color:var(--text); display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:var(--shadow); transition:.2s; }
        .icon-btn:active { transform:scale(.92); }

        /* ── Views (Swipe tabs) ─────────────────────────────────────── */
        .views-wrapper { display: flex; width: 500%; transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1); will-change: transform; direction: ltr; }
        .view { width: 20%; flex-shrink: 0; padding: 0 16px; }

        /* ── Common Cards & Sections ────────────────────────────────── */
        .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:14px; box-shadow:var(--shadow); }
        .sec-title { font-size:1rem; font-weight:700; margin:20px 0 12px; display:flex; justify-content:space-between; align-items:center; text-transform:uppercase; letter-spacing:0.5px; }

        /* ── Debt Banner ────────────────────────────────────────────── */
        .debt-alert { background:rgba(235,87,87,0.1); border:1px solid rgba(235,87,87,0.3); border-radius:16px; padding:16px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; }
        .debt-alert .debt-text { color:var(--text); font-weight:600; font-size:0.9rem; }
        .debt-alert .debt-sum { color:var(--red); font-weight:800; font-size:1.2rem; }

        /* ── Filters ────────────────────────────────────────────────── */
        .deals-filter { display:flex; gap:8px; margin-bottom:16px; background:var(--surface); padding:4px; border-radius:14px; border:1px solid var(--border); }
        .filter-btn-tab { flex:1; background:transparent; border:none; color:var(--text2); padding:10px; border-radius:10px; cursor:pointer; font-weight:600; font-size:0.85rem; transition:.2s; }
        .filter-btn-tab.active { background:var(--surface2); color:var(--text); box-shadow:0 2px 8px rgba(0,0,0,0.05); }

        /* ── Deal Card ──────────────────────────────────────────────── */
        .deal-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:12px; box-shadow:var(--shadow); position:relative; }
        .deal-card.pending { border-color:rgba(155,81,224,0.4); background:rgba(155,81,224,0.03); }
        .deal-card.unpaid { border-color:rgba(235,87,87,0.4); box-shadow:0 0 15px rgba(235,87,87,0.08); }
        
        .deal-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
        .deal-client { font-family:'Sora',sans-serif; font-size:1.15rem; font-weight:800; margin-bottom:2px; }
        .deal-date { font-size:0.75rem; color:var(--text2); font-weight:500; }
        
        .status-badge { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:8px; font-size:0.7rem; font-weight:700; white-space:nowrap; }
        .st-new { background:rgba(242,201,76,0.15); color:var(--gold); }
        .st-progress { background:rgba(86,204,242,0.15); color:var(--accent1); }
        .st-closed { background:rgba(39,174,96,0.15); color:var(--green); }
        .st-rejected { background:rgba(235,87,87,0.15); color:var(--red); }
        .st-pending { background:rgba(155,81,224,0.15); color:var(--purple); }
        
        .deal-pending-note { font-size:0.75rem; color:var(--purple); background:rgba(155,81,224,0.1); border-radius:8px; padding:8px 12px; margin-bottom:12px; font-weight:600; display:flex; align-items:center; gap:6px; }
        
        .deal-info { font-size:0.85rem; color:var(--text2); margin-bottom:14px; line-height:1.6; }
        .deal-info span { font-weight:600; color:var(--text); }
        .deal-wa-link { color:var(--accent2); text-decoration:none; font-weight:600; display:inline-flex; align-items:center; gap:4px; }
        
        .deal-receipt { background:var(--surface2); border-radius:12px; padding:12px; margin-bottom:16px; border:1px solid var(--border); }
        .receipt-line { display:flex; justify-content:space-between; font-size:0.8rem; color:var(--text2); margin-bottom:6px; }
        .receipt-line.agent { color:var(--text); font-weight:500; }
        .receipt-line.agent .unpaid-warn { color:var(--red); font-weight:700; }
        .receipt-line.agent .paid-ok { color:var(--green); font-size:0.75rem; font-weight:700; }
        .receipt-line.total { border-top:1px dashed var(--border); padding-top:8px; margin-top:4px; margin-bottom:0; color:var(--text); font-weight:800; font-size:0.95rem; }
        .receipt-line.total .net-profit { color:var(--green); }
        
        .btn-action { display:flex; justify-content:center; align-items:center; gap:8px; width:100%; background:var(--surface2); color:var(--text); border:1px solid var(--border); font-weight:600; font-size:0.9rem; padding:12px; border-radius:12px; cursor:pointer; transition:.2s; }
        .btn-action:active { transform:scale(0.98); background:var(--border); }

        /* ── Stats View ─────────────────────────────────────────────── */
        .stats-grid-3 { display:grid; grid-template-columns:repeat(2, 1fr); gap:8px; margin-bottom:16px; }
        .stats-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px; }
        .stat-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:16px 8px; text-align:center; box-shadow:var(--shadow); }
        .stats-grid-2 .stat-box { padding:20px; border-radius:20px; }
        .stat-val { font-family:'Sora',sans-serif; font-weight:800; color:var(--text); margin-bottom:4px; }
        .stats-grid-3 .stat-val { font-size:1.15rem; }
        .stats-grid-2 .stat-val { font-size:1.8rem; }
        .stat-lbl { color:var(--text2); font-weight:600; font-size:0.65rem; text-transform:uppercase; letter-spacing:0.5px; }
        
        .funnel-container { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:20px; margin-bottom:24px; box-shadow:var(--shadow); }
        .funnel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; font-weight:700; font-size:0.95rem; }
        .funnel-conv { color:var(--green); background:rgba(39,174,96,0.15); padding:4px 10px; border-radius:8px; font-size:0.85rem; }
        .f-bar-wrap { display:flex; align-items:center; margin-bottom:14px; gap:12px; }
        .f-lbl { width:85px; font-size:0.75rem; font-weight:600; color:var(--text2); flex-shrink:0; text-transform:uppercase; }
        .f-bar-bg { flex:1; background:var(--surface2); height:10px; border-radius:5px; overflow:hidden; border:1px solid var(--border); }
        .f-bar { height:100%; border-radius:5px; width:0%; transition:width 1s cubic-bezier(0.25,1,0.5,1); }
        [dir="rtl"] .f-bar { float:right; }
        .f-active { background:var(--accent1); } .f-closed { background:var(--green); } .f-rejected { background:var(--red); }
        .f-val { width:35px; text-align:right; font-weight:700; font-size:0.9rem; }

        /* ── Radar / My Agents View ─────────────────────────────────── */
        .agent-list-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow); margin-bottom:12px; position:relative; overflow:hidden;}
        .agent-list-card .avatar { width: 46px; height: 46px; border-radius: 12px; background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: #fff; font-family: 'Sora', sans-serif; font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; text-transform: uppercase; }
        .agent-list-card .info { flex: 1; min-width: 0; z-index:2;}
        .agent-list-card .name { font-weight: 800; font-size: 1rem; color: var(--text); margin-bottom: 2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
        .agent-list-card .deals { font-size: 0.75rem; color: var(--text2); }
        .agent-list-card .deals span { color: var(--text); font-weight: 700; }
        .agent-list-card .comm { text-align: right; flex-shrink: 0; z-index:2;}
        .agent-list-card .comm-lbl { font-size: 0.65rem; color: var(--text2); text-transform: uppercase; margin-bottom: 2px; }
        .agent-list-card .comm-val { font-size: 1rem; font-weight: 800; color: var(--gold); }
        
        .lb-agent-rank { width: 40px; height: 40px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-radius: 12px; background: var(--bg); font-size: 1.1rem; font-weight: 800; color: var(--text2); border: 1px solid var(--border); }
        .lb-rank-1 { background: rgba(255, 215, 0, 0.15); color: #FFD700; border-color: rgba(255, 215, 0, 0.3); font-size: 1.3rem; }
        .lb-rank-2 { background: rgba(192, 192, 192, 0.15); color: #C0C0C0; border-color: rgba(192, 192, 192, 0.3); font-size: 1.3rem; }
        .lb-rank-3 { background: rgba(205, 127, 50, 0.15); color: #CD7F32; border-color: rgba(205, 127, 50, 0.3); font-size: 1.3rem; }
        
        .lb-blurred .name { filter: blur(5px); opacity: 0.7; user-select: none; }
        .lb-blurred { cursor: pointer; }
        .lb-blurred:active { transform: scale(0.98); }

        .pro-overlay-card { background: linear-gradient(135deg, rgba(242, 201, 76, 0.1), rgba(242, 153, 74, 0.1)); border: 1px solid rgba(242, 201, 76, 0.3); border-radius: 20px; padding: 24px; text-align: center; margin-bottom: 24px; box-shadow: 0 8px 32px rgba(242, 201, 76, 0.1); }
        .pro-overlay-card h3 { font-family: 'Sora', sans-serif; font-size: 1.2rem; margin-bottom: 8px; color: var(--text); }
        .pro-overlay-card p { font-size: 0.85rem; color: var(--text2); margin-bottom: 16px; line-height: 1.5; }

        /* ── Profile View ───────────────────────────────────────────── */
        .profile-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:0 20px; margin-bottom:16px; box-shadow:var(--shadow); }
        .prof-row { display:flex; justify-content:space-between; align-items:center; padding:16px 0; border-bottom:1px solid var(--border); }
        .prof-row:last-child { border-bottom:none; }
        .prof-lbl { color:var(--text2); font-size:0.85rem; font-weight:600; }
        .prof-val { font-weight:700; font-size:0.9rem; text-align:right; max-width:60%; word-break:break-word; }
        
        .sub-card { background: linear-gradient(135deg, rgba(86,204,242,0.1), rgba(47,128,237,0.1)); border: 1px solid rgba(47,128,237,0.3); border-radius: 20px; padding: 20px; margin-bottom: 24px; }
        .sub-card .sub-title { font-family: 'Sora', sans-serif; font-size: 1.1rem; font-weight: 800; margin-bottom: 8px; display:flex; justify-content:space-between; }
        .sub-card .sub-badge { font-size: 0.7rem; font-weight: 700; background: var(--accent2); color: #fff; padding: 3px 8px; border-radius: 8px; }
        .sub-card .sub-desc { font-size: 0.85rem; color: var(--text2); line-height: 1.5; margin-bottom: 16px; }

        /* ── Buttons ────────────────────────────────────────────────── */
        .btn-primary { background:var(--text); color:var(--bg); border:none; padding:14px 22px; border-radius:14px; font-weight:700; font-size:0.95rem; width:100%; cursor:pointer; transition:.2s; font-family:inherit; display:flex; justify-content:center; align-items:center; gap:8px; }
        .btn-primary:active { transform:scale(.97); }
        .btn-accent { background:var(--accent2); color:#fff; }
        .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); padding: 13px 22px; border-radius: 13px; font-weight: 700; font-size: .85rem; }
        .btn-gold { background: linear-gradient(135deg, #F2C94C, #F2994A); color: #1A1A2E; border: none; }
        
        .btn-wa { background:#25D366; color:#fff; box-shadow:0 4px 16px rgba(37,211,102,.25); text-decoration:none; margin-top:14px; display:none; }
        .btn-tg { background:#2F80ED; color:#fff; box-shadow:0 4px 16px rgba(47,128,237,.25); text-decoration:none; margin-top:14px; display:none; }

        /* ── Bottom Nav ─────────────────────────────────────────────── */
        .bottom-nav { position:fixed; bottom:0; width:100%; max-width:430px; background:var(--nav-bg); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); display:flex; justify-content:space-between; padding:10px 16px 22px; border-top:1px solid var(--border); z-index:100; }
        .nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; color:var(--text2); cursor:pointer; transition:.2s; background:transparent; border:none; padding:2px 4px; }
        .nav-item.active { color:var(--accent2); }
        .nav-item span { font-size:.58rem; font-weight:700; }
        .nav-item svg { transition:.2s; width: 22px; height: 22px; }
        .nav-item.active svg { transform:translateY(-2px); }

        /* ── Full Screen Sheets (Slide-over) ────────────────────────── */
        .fullscreen { display:none; position:fixed; inset:0; background:var(--bg); z-index:500; overflow-y:auto; padding:24px 16px 40px; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1); }
        [dir="rtl"] .fullscreen { transform: translateX(-100%); }
        .fullscreen.active { display:block; transform: translateX(0) !important; }
        .fullscreen.slide-out-left { display:block; transform: translateX(-100%); }
        [dir="rtl"] .fullscreen.slide-out-left { display:block; transform: translateX(100%); }
        
        .btn-back { background:transparent; border:none; color:var(--text2); font-size:0.95rem; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:8px; padding:8px 0; margin-bottom:20px; transition:.2s; }
        .btn-back:active { opacity: 0.6; transform: translateX(-4px); }
        .sheet-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:22px; margin-bottom:18px; box-shadow:var(--shadow2); }
        .sheet-title { font-family:'Sora',sans-serif; font-size:1.4rem; font-weight:800; margin-bottom:20px; }

        /* ── Form Inputs ────────────────────────────────────────────── */
        .input-label { font-size:.82rem; color:var(--text2); font-weight:600; margin-bottom:5px; display:block; }
        .custom-input { width:100%; padding:14px 16px
