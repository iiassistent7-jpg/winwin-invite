<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Регистрация Win-Win</title>

  <meta name="theme-color" content="#6c63ff" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-1: #0a0a0f;
      --bg-2: #1a1a2e;
      --accent-1: #6c63ff;
      --accent-2: #00d4aa;
      --text-main: #ffffff;
      --text-muted: #a0a0b0;
      --error: #ff4d4f;
      --card: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.08);
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      --max-width: 480px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      font-family: "Inter", system-ui, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 20% 20%, rgba(108, 99, 255, 0.14), transparent 35%),
        radial-gradient(circle at 80% 10%, rgba(0, 212, 170, 0.12), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2), #111122, var(--bg-1));
      background-size: 180% 180%;
      animation: bgShift 15s ease infinite;
    }

    body { display: flex; justify-content: center; align-items: flex-start; padding: 24px; min-height: 100vh; }
    body.rtl { direction: rtl; }

    @keyframes bgShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .shell {
      width: 100%;
      max-width: var(--max-width);
      opacity: 0;
      transform: translateY(12px);
      animation: pageIn 0.6s var(--ease-out) forwards;
    }

    @keyframes pageIn { to { opacity: 1; transform: translateY(0); } }

    .panel {
      position: relative;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 30px 22px 24px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.28);
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(108,99,255,0.4), rgba(0,212,170,0.18), rgba(255,255,255,0.05));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ШАПКА */
    .header { text-align: center; margin-bottom: 24px; }
    .logo {
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .page-title {
      margin-top: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    /* ФОРМА */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="tel"],
    select {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--card-border);
      color: #fff;
      padding: 14px 16px;
      border-radius: 14px;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, select:focus {
      border-color: var(--accent-1);
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
    }

    input.error, select.error {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(255, 77, 79, 0.2);
    }

    select option { background: var(--bg-2); color: #fff; }

    /* СЕГМЕНТИРОВАННЫЕ КНОПКИ (Radio) */
    .segment-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .segment-label {
      flex: 1;
      text-align: center;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 10px 4px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
      min-width: 70px;
    }
    .segment-label input { display: none; }
    .segment-label:has(input:checked) {
      background: linear-gradient(135deg, rgba(108,99,255,0.3), rgba(0,212,170,0.2));
      border-color: rgba(108,99,255,0.5);
      color: var(--text-main);
    }
    .segment-group.error .segment-label { border-color: var(--error); }

    /* КНОПКА ОТПРАВКИ */
    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      border: none;
      color: #fff;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 16px;
      border-radius: 999px;
      margin-top: 10px;
      cursor: pointer;
      transition: transform 0.2s, filter 0.2s, opacity 0.2s;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .submit-btn:hover:not(:disabled) { transform: scale(1.02); filter: brightness(1.1); }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      background: var(--card);
      color: var(--text-muted);
      border: 1px solid var(--card-border);
    }

    /* СКРЫТИЕ ЭЛЕМЕНТОВ */
    .hidden { display: none !important; }

    /* ВЫБОР МЕССЕНДЖЕРА */
    .messenger-choice {
      display: none;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
      animation: pageIn 0.4s var(--ease-out) forwards;
    }
    .messenger-choice.visible { display: flex; }

    .wa-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #25D366, #128C7E);
      border: none; border-radius: 999px;
      color: #fff; font-family: inherit; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; text-decoration: none;
      box-shadow: 0 8px 24px rgba(37,211,102,0.3);
      transition: transform 0.2s, filter 0.2s;
    }
    .wa-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

    .tg-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #2AABEE, #229ED9);
      border: none; border-radius: 999px;
      color: #fff; font-family: inherit; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; text-decoration: none;
      box-shadow: 0 8px 24px rgba(42,171,238,0.3);
      transition: transform 0.2s, filter 0.2s;
    }
    .tg-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

    .choice-title {
      text-align: center;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <header class="header">
        <h1 class="logo">Win-Win</h1>
        <div class="page-title" id="pageTitle">Регистрация</div>
      </header>

      <form id="regForm" novalidate>
        
        <div class="form-group role-client hidden">
          <label>Имя</label>
          <input type="text" id="clientName" name="clientName" placeholder="Ваше имя" data-req="client">
        </div>
        <div class="form-group role-client hidden">
          <label>Телефон</label>
          <input type="tel" id="clientPhone" name="clientPhone" placeholder="05XXXXXXXX" data-req="client" pattern="^\d{10,12}$">
        </div>

        <div class="form-group role-agent role-business hidden">
          <label id="nameLabel">Имя и фамилия</label>
          <input type="text" id="fullName" name="fullName" placeholder="Введите данные" data-req="agent,business">
        </div>

        <div class="form-group role-business hidden">
          <label>Ниша бизнеса</label>
          <select id="niche" name="niche" data-req="business">
            <option value="" disabled selected>Выберите нишу...</option>
            <option value="💅 Красота">💅 Красота</option>
            <option value="🏠 Недвижимость">🏠 Недвижимость</option>
            <option value="🏥 Здоровье">⚕️ Здоровье</option>
            <option value="🍕 Еда и рестораны">🍔 Еда</option>
            <option value="⚖️ Юристы">⚖️ Юристы</option>
            <option value="💰 Финансы">💰 Финансы</option>
            <option value="🔧 Ремонт и стройка">🛠 Ремонт</option>
            <option value="💻 IT">💻 IT</option>
            <option value="🐾 Животные">🐾 Животные</option>
            <option value="👗 Одежда и товары">👗 Одежда</option>
            <option value="🎓 Обучение">🎓 Обучение</option>
            <option value="🚗 Авто">🚗 Авто</option>
            <option value="📦 Другое">📦 Другое</option>
          </select>
        </div>

        <div class="form-group role-business hidden">
          <label>Вознаграждение агенту</label>
          <div class="segment-group" id="rewardTypeGroup">
            <label class="segment-label"><input type="radio" name="rewardType" value="percent" data-req="business"> % от сделки</label>
            <label class="segment-label"><input type="radio" name="rewardType" value="fixed" data-req="business"> Фикс ₪</label>
            <label class="segment-label"><input type="radio" name="rewardType" value="gift" data-req="business"> Подарок/услуга</label>
          </div>
          <input type="text" id="rewardValue" name="rewardValue" placeholder="Размер вознаграждения" style="margin-top: 8px;" class="hidden" data-req="business">
        </div>

        <div class="form-group role-agent role-business hidden">
          <label id="paymentLabel">Способ выплаты агентам</label>
          <div class="segment-group" id="paymentMethodGroup">
            <label class="segment-label"><input type="radio" name="paymentMethod" value="bit" data-req="agent,business"> Bit</label>
            <label class="segment-label"><input type="radio" name="paymentMethod" value="paypal" data-req="agent,business"> PayPal</label>
            <label class="segment-label"><input type="radio" name="paymentMethod" value="transfer" data-req="agent,business"> Перевод</label>
            <label class="segment-label"><input type="radio" name="paymentMethod" value="cash" data-req="agent,business"> Наличные</label>
          </div>
        </div>

        <div class="form-group role-agent role-business hidden">
          <label>Ссылка на сайт/соцсеть (необязательно)</label>
          <input type="text" id="socialLink" name="socialLink" placeholder="Instagram, Facebook, сайт...">
        </div>

        <div class="form-group role-agent role-business hidden">
          <label>Язык общения</label>
          <div class="segment-group" id="languageGroup">
            <label class="segment-label"><input type="radio" name="language" value="en" data-req="agent,business"> 🇬🇧 EN</label>
            <label class="segment-label"><input type="radio" name="language" value="he" data-req="agent,business"> 🇮🇱 HE</label>
            <label class="segment-label"><input type="radio" name="language" value="ar" data-req="agent,business"> 🇸🇦 AR</label>
            <label class="segment-label"><input type="radio" name="language" value="ru" data-req="agent,business"> 🇷🇺 RU</label>
          </div>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn" disabled>
          <span id="btnText">Зарегистрироваться</span>
          <span class="loader" id="btnLoader"></span>
        </button>

      </form>

      <!-- Выбор мессенджера — показывается после успешной отправки -->
      <div class="messenger-choice" id="messengerChoice">
        <div class="choice-title" id="choiceTitle">Выберите мессенджер для продолжения</div>
        <a id="waBtn" class="wa-btn" href="#">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.522 5.855L.057 23.386a.75.75 0 00.923.923l5.562-1.457A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.693-.512-5.228-1.402l-.374-.22-3.899 1.022 1.03-3.774-.242-.389A9.956 9.956 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
          WhatsApp
        </a>
        <a id="tgBtn" class="tg-btn" href="#">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
          Telegram
        </a>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      // Определяем роль из URL (по умолчанию client)
      const role = urlParams.get('role') || 'client'; 
      
      const form = document.getElementById("regForm");
      const submitBtn = document.getElementById("submitBtn");
      const btnText = document.getElementById("btnText");
      const rewardRadios = document.querySelectorAll('input[name="rewardType"]');
      const rewardValue = document.getElementById("rewardValue");
      
      // Настройка интерфейса под роль
      document.querySelectorAll(`.role-${role}`).forEach(el => el.classList.remove('hidden'));
      
      const titles = {
        client: "Оставить контакт",
        agent: "Регистрация агента",
        business: "Регистрация бизнеса"
      };
      document.getElementById("pageTitle").textContent = titles[role] || titles.client;

      // Тексты выбора мессенджера по языку
      const choiceTitles = {
        ru: "Выберите мессенджер для продолжения",
        en: "Choose messenger to continue",
        he: "בחרו מסנג'ר להמשך",
        ar: "اختر تطبيق المراسلة للمتابعة"
      };

      if (role === 'client') {
        btnText.textContent = "Отправить контакт";
      } else if (role === 'business') {
        document.getElementById("nameLabel").textContent = "Название бизнеса";
      } else if (role === 'agent') {
        document.getElementById("nameLabel").textContent = "Имя и фамилия";
        document.getElementById("paymentLabel").textContent = "Способ получения бонуса";
      }

      // Показ поля ввода значения вознаграждения
      rewardRadios.forEach(radio => {
        radio.addEventListener('change', (e) => {
          rewardValue.classList.remove('hidden');
          validateForm();
        });
      });

      // Логика валидации
      const getRequiredElements = () => {
        const reqEls = [];
        // Собираем текстовые инпуты и селекты
        form.querySelectorAll(`input[type="text"][data-req*="${role}"], input[type="tel"][data-req*="${role}"], select[data-req*="${role}"]`).forEach(el => {
            // Исключаем rewardValue если тип не выбран
            if(el.id === 'rewardValue' && el.classList.contains('hidden')) return;
            reqEls.push(el);
        });
        // Собираем группы радио-кнопок
        ['rewardType', 'paymentMethod', 'language'].forEach(name => {
          const radio = form.querySelector(`input[name="${name}"][data-req*="${role}"]`);
          if (radio) reqEls.push({ isRadioGroup: true, name: name });
        });
        return reqEls;
      };

      const checkValidation = () => {
        let isValid = true;
        const reqEls = getRequiredElements();

        reqEls.forEach(el => {
          if (el.isRadioGroup) {
            const checked = form.querySelector(`input[name="${el.name}"]:checked`);
            if (!checked) isValid = false;
          } else {
            if (!el.value.trim()) {
              isValid = false;
            } else if (el.type === 'tel') {
              const regex = new RegExp(el.pattern);
              if (!regex.test(el.value.trim())) isValid = false;
            }
          }
        });
        return isValid;
      };

      const validateForm = () => {
        submitBtn.disabled = !checkValidation();
      };

      // Подсветка ошибок при blur (потеря фокуса)
      form.addEventListener('focusout', (e) => {
        const el = e.target;
        if (el.tagName === 'INPUT' || el.tagName === 'SELECT') {
          if (el.dataset.req && el.dataset.req.includes(role)) {
            if (!el.value.trim() || (el.type === 'tel' && !new RegExp(el.pattern).test(el.value.trim()))) {
              el.classList.add('error');
            } else {
              el.classList.remove('error');
            }
          }
        }
        validateForm();
      });

      // Снятие ошибки при вводе и валидация
      form.addEventListener('input', (e) => {
        if(e.target.classList.contains('error')) {
            e.target.classList.remove('error');
        }
        // Убираем красную рамку с групп радио-кнопок
        if(e.target.type === 'radio') {
            e.target.closest('.segment-group').classList.remove('error');
        }
        validateForm();
      });

      // Отправка формы
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Финальная проверка (на случай обхода) и подсветка пустых радио-групп
        if (!checkValidation()) {
            getRequiredElements().forEach(el => {
              if (el.isRadioGroup) {
                if (!form.querySelector(`input[name="${el.name}"]:checked`)) {
                    document.getElementById(el.name + 'Group').classList.add('error');
                }
              } else if (!el.value.trim()) {
                  el.classList.add('error');
              }
            });
            return;
        }

        submitBtn.disabled = true;
        btnText.style.display = 'none';
        document.getElementById('btnLoader').style.display = 'inline-block';

        // Собираем данные
        const formData = new FormData(form);
        const payload = { role: role };
        
        // Скрытые параметры
        payload.sender = urlParams.get('sender') || '';
        payload.receiver = urlParams.get('receiver') || '';
        payload.type = urlParams.get('type') || '';

        // Видимые поля
        for (let [key, value] of formData.entries()) {
          payload[key] = value;
        }

        try {
          const response = await fetch('https://amlatsa-bot-production.up.railway.app/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          let respData = {};
          try { respData = await response.clone().json(); } catch(e) {}

          if (response.ok) {
            // Формируем тексты для WA и TG
            let waText = "Привет! 👋\nНажми отправить 👉";
            let tgStart = "start";

            if (role === 'client') {
              const s = urlParams.get('sender') || '';
              const r = urlParams.get('receiver') || '';
              if (s && r) { waText = "client_" + s + "_" + r; tgStart = "client_" + s + "_" + r; }
              else if (s) { waText = "client_" + s; tgStart = "client_" + s; }
            } else if (respData.temp_key) {
              waText = "reg_" + respData.temp_key;
              tgStart = "reg_" + respData.temp_key;
            }

            // Скрываем форму, показываем выбор мессенджера
            document.getElementById("regForm").style.display = "none";
            const choice = document.getElementById("messengerChoice");
            choice.classList.add("visible");

            // Устанавливаем ссылки
            document.getElementById("waBtn").href = "https://wa.me/972534218573?text=" + encodeURIComponent(waText);
            document.getElementById("tgBtn").href = "https://t.me/winwin_lead_bot?start=" + encodeURIComponent(tgStart);

            // Восстанавливаем кнопку на случай возврата
            submitBtn.disabled = false;
            btnText.style.display = 'inline';
            document.getElementById('btnLoader').style.display = 'none';
          } else {
            throw new Error('Server error');
          }
        } catch (error) {
          alert('Произошла ошибка при отправке данных. Пожалуйста, попробуйте позже.');
          submitBtn.disabled = false;
          btnText.style.display = 'inline';
          document.getElementById('btnLoader').style.display = 'none';
        }
      });
    });
  </script>
</body>
</html>
