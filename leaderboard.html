<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Win-Win | Зал Славы</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #1a1a2e; 
      --bg-2: #0f0f1a;
      --accent-1: #56CCF2; 
      --accent-2: #2F80ED;
      --text-muted: #a0a0b0;
      --card: rgba(255, 255, 255, 0.05); 
      --card-border: rgba(255, 255, 255, 0.1);
      --success: #27AE60; 
      --danger: #EB5757; 
      --warning: #F2C94C;
      --gold: #FFD700;
      --silver: #C0C0C0;
      --bronze: #CD7F32;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Inter", sans-serif; }
    body { background: var(--bg-1); color: #fff; min-height: 100vh; display: flex; justify-content: center; }
    
    [dir="rtl"] { text-align: right; }
    [dir="rtl"] .agent-earned { text-align: left; }
    
    .shell { width: 100%; max-width: 600px; padding: 24px 16px 100px 16px; position: relative; }
    
    /* Шапка и переключение языков */
    .lang-switcher { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .lang-btn { background: var(--card); border: 1px solid var(--card-border); color: var(--text-muted); border-radius: 20px; padding: 6px 12px; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .lang-btn.active { background: linear-gradient(135deg, rgba(86,204,242,0.2), rgba(47,128,237,0.2)); color: #fff; border-color: rgba(86,204,242,0.5); }
    
    .header { text-align: center; margin-bottom: 32px; }
    .logo { font-size: 2rem; font-weight: 800; background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); -webkit-background-clip: text; color: transparent; margin-bottom: 4px; line-height: 1.2; }
    .title { font-size: 1.3rem; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
    
    .section-title { font-size: 0.95rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; margin-top: 32px; }
    
    /* Карточки Зала Славы */
    .agents-list { display: flex; flex-direction: column; gap: 12px; }
    
    .agent-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      opacity: 0;
      animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    
    .agent-card.highlight {
      background: linear-gradient(135deg, rgba(86,204,242,0.1), rgba(47,128,237,0.05));
      border-color: var(--accent-1);
      box-shadow: 0 0 15px rgba(86,204,242,0.2);
    }
    
    .agent-rank {
      width: 44px; height: 44px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      font-size: 1.2rem; font-weight: 800; color: var(--text-muted);
    }
    
    /* Медали */
    .rank-1 { background: rgba(255, 215, 0, 0.15); color: var(--gold); border: 1px solid rgba(255, 215, 0, 0.3); font-size: 1.5rem; }
    .rank-2 { background: rgba(192, 192, 192, 0.15); color: var(--silver); border: 1px solid rgba(192, 192, 192, 0.3); font-size: 1.5rem; }
    .rank-3 { background: rgba(205, 127, 50, 0.15); color: var(--bronze); border: 1px solid rgba(205, 127, 50, 0.3); font-size: 1.5rem; }
    
    .agent-info { flex: 1; }
    .agent-name { font-weight: 800; font-size: 1.05rem; color: #fff; margin-bottom: 4px; }
    .agent-deals { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }
    .agent-deals span { color: #fff; font-weight: 700; }
    
    .agent-earned { text-align: right; }
    .earned-lbl { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; }
    .earned-val { font-size: 1.15rem; font-weight: 800; color: var(--success); }
    
    /* Анимации */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Фиксированные кнопки внизу */
    .bottom-actions {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 560px; display: flex; gap: 12px; z-index: 100;
    }
    .btn {
      flex: 1; display: block; text-align: center; color: #fff; text-decoration: none;
      font-weight: 700; font-size: 1rem; padding: 16px; border-radius: 16px;
      transition: 0.2s; border: none; cursor: pointer;
    }
    .btn:active { transform: scale(0.96); }
    .btn-wa { background: #25D366; box-shadow: 0 8px 24px rgba(37,211,102,0.25); }
    .btn-tg { background: #2F80ED; box-shadow: 0 8px 24px rgba(47,128,237,0.25); }
    
    /* Загрузка и ошибки */
    .loading-overlay { position: fixed; inset: 0; background: var(--bg-1); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; padding: 20px; text-align: center; }
    .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--accent-1); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err-msg { font-size: 1.1rem; font-weight: 600; color: var(--danger); margin-bottom: 24px; display: none; }
  </style>
</head>
<body>

  <div class="loading-overlay" id="globalLoader">
    <div class="spinner" id="spinner"></div>
    <div id="loaderText" style="font-weight:600; color:var(--accent-1);">Загрузка...</div>
    <div class="err-msg" id="errMsg">Ссылка устарела. Запросите новую в боте.</div>
    <a href="#" class="btn btn-wa" id="errWaBtn" style="display:none; width:100%; max-width:300px; margin-top:16px;">WhatsApp</a>
    <a href="https://t.me/winwin_lead_bot" class="btn btn-tg" id="errTgBtn" style="display:none; width:100%; max-width:300px; margin-top:12px;">Telegram</a>
  </div>

  <div class="shell" style="display:none;" id="mainShell">
    
    <div class="lang-switcher">
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('he')">HE</button>
      <button class="lang-btn" onclick="setLang('ar')">AR</button>
      <button class="lang-btn active" onclick="setLang('ru')">RU</button>
    </div>
    
    <header class="header">
      <h1 class="logo">Win-Win</h1>
      <div class="title" id="t_title">🏆 Зал Славы</div>
    </header>

    <div id="yourPositionContainer"></div>

    <div class="section-title" id="t_top_agents">Топ агентов</div>
    <div class="agents-list" id="leaderboardList"></div>

    <div class="bottom-actions" id="btnGroup">
      <a href="#" class="btn btn-wa" id="btnWa" style="display:none;">WhatsApp</a>
      <a href="https://t.me/winwin_lead_bot" class="btn btn-tg" id="btnTg" style="display:none;">Telegram</a>
    </div>
    
  </div>

  <script>
    // i18n локализация
    const i18n = {
      ru: { 
        title: "🏆 Зал Славы", your_pos: "Ваша позиция", top_agents: "Топ агентов", 
        deals: "Сделок:", earned: "Заработано", loading: "Загрузка...", 
        expired: "Ссылка устарела. Запросите новую в боте.", wa: "WhatsApp", tg: "Telegram" 
      },
      en: { 
        title: "🏆 Leaderboard", your_pos: "Your Position", top_agents: "Top Agents", 
        deals: "Deals:", earned: "Earned", loading: "Loading...", 
        expired: "Link expired. Request a new one in the bot.", wa: "WhatsApp", tg: "Telegram" 
      },
      he: { 
        title: "🏆 היכל התהילה", your_pos: "המיקום שלך", top_agents: "הסוכנים המובילים", 
        deals: "עסקאות:", earned: "הרוויח", loading: "טוען...", 
        expired: "הקישור פג תוקף. בקש חדש בבוט.", wa: "WhatsApp", tg: "Telegram" 
      },
      ar: { 
        title: "🏆 قاعة المشاهير", your_pos: "مركزك", top_agents: "أفضل الوكلاء", 
        deals: "صفقات:", earned: "المكتسبات", loading: "جاري التحميل...", 
        expired: "انتهت صلاحية الرابط. اطلب جديداً في البوت.", wa: "WhatsApp", tg: "Telegram" 
      }
    };

    let currentLang = 'ru';
    let token = new URLSearchParams(window.location.search).get('token');
    let boardData = null;
    const API_URL = "https://amlatsa-bot-production.up.railway.app";

    // Инициализация
    function init() {
      const urlLang = new URLSearchParams(window.location.search).get('lang');
      if (urlLang && i18n[urlLang]) currentLang = urlLang;
      setLang(currentLang, false);
      
      if (!token) { 
        showError(i18n[currentLang].expired); 
        return; 
      }
      fetchData();
    }

    // Смена языка
    function setLang(lang, render = true) {
      currentLang = lang;
      document.documentElement.lang = lang;
      document.documentElement.dir = (lang === 'he' || lang === 'ar') ? 'rtl' : 'ltr';
      
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
      
      const L = i18n[lang];
      document.getElementById('loaderText').textContent = L.loading;
      document.getElementById('errMsg').textContent = L.expired;
      document.getElementById('t_title').textContent = L.title;
      document.getElementById('t_top_agents').textContent = L.top_agents;
      document.getElementById('btnWa').textContent = L.wa;
      document.getElementById('btnTg').textContent = L.tg;
      document.getElementById('errWaBtn').textContent = L.wa;
      document.getElementById('errTgBtn').textContent = L.tg;

      if (render && boardData) {
        renderLeaderboard();
      }
    }

    // Обработка ошибок (401)
    function showError(msg) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('loaderText').style.display = 'none';
      document.getElementById('errMsg').style.display = 'block';
      document.getElementById('errMsg').textContent = msg;
      
      const phone = boardData?.bot_phone || '972534218573';
      const channel = boardData?.channel || null;
      
      if (channel === 'telegram') {
        document.getElementById('errTgBtn').style.display = 'block';
      } else if (channel === 'whatsapp') {
        document.getElementById('errWaBtn').href = `https://wa.me/${phone}`;
        document.getElementById('errWaBtn').style.display = 'block';
      } else {
        document.getElementById('errTgBtn').style.display = 'block';
        document.getElementById('errWaBtn').href = `https://wa.me/${phone}`;
        document.getElementById('errWaBtn').style.display = 'block';
      }
    }

    // Получение данных
    async function fetchData() {
      try {
        const res = await fetch(`${API_URL}/api/leaderboard?token=${token}`);
        if (!res.ok) throw new Error('Auth failed');
        boardData = await res.json();
        
        document.getElementById('globalLoader').style.display = 'none';
        document.getElementById('mainShell').style.display = 'block';
        
        setupButtons();
        renderLeaderboard();
      } catch (err) {
        showError(i18n[currentLang].expired);
      }
    }

    // Настройка нижних кнопок связи
    function setupButtons() {
      const phone = boardData.bot_phone || '972534218573';
      const channel = boardData.channel || null;
      const btnWa = document.getElementById('btnWa');
      const btnTg = document.getElementById('btnTg');
      
      btnWa.href = `https://wa.me/${phone}`;
      
      if (channel === 'telegram') {
        btnTg.style.display = 'block';
      } else if (channel === 'whatsapp') {
        btnWa.style.display = 'block';
      } else {
        btnTg.style.display = 'block';
        btnWa.style.display = 'block';
      }
    }

    // Генерация HTML карточки агента
    function createAgentCardHTML(agent, isCurrent, idx, listType) {
      const L = i18n[currentLang];
      let rankBadge = agent.rank;
      let rankClass = '';
      
      if (agent.rank === 1) { rankBadge = '🥇'; rankClass = 'rank-1'; }
      else if (agent.rank === 2) { rankBadge = '🥈'; rankClass = 'rank-2'; }
      else if (agent.rank === 3) { rankBadge = '🥉'; rankClass = 'rank-3'; }
      
      const highlightClass = isCurrent ? 'highlight' : '';
      const animDelay = idx * 0.08; // Stagger effect
      
      // Генерируем уникальные ID для Count Up
      const dealsId = `deals_${listType}_${agent.rank}`;
      const earnedId = `earned_${listType}_${agent.rank}`;

      return `
        <div class="agent-card ${highlightClass}" style="animation-delay: ${animDelay}s">
          <div class="agent-rank ${rankClass}">${rankBadge}</div>
          <div class="agent-info">
            <div class="agent-name">${agent.name}</div>
            <div class="agent-deals">${L.deals} <span id="${dealsId}">0</span></div>
          </div>
          <div class="agent-earned">
            <div class="earned-lbl">${L.earned}</div>
            <div class="earned-val"><span id="${earnedId}">0</span> ₪</div>
          </div>
        </div>
      `;
    }

    // Рендер страницы
    function renderLeaderboard() {
      const L = i18n[currentLang];
      const topList = document.getElementById('leaderboardList');
      const posContainer = document.getElementById('yourPositionContainer');
      
      let htmlTop = '';
      let htmlPos = '';
      let isCurrentInTop10 = false;

      // Рендерим Топ-10
      if (boardData.top_agents && boardData.top_agents.length > 0) {
        boardData.top_agents.forEach((agent, index) => {
          const isCurrent = (boardData.current_agent && agent.rank === boardData.current_agent.rank);
          if (isCurrent) isCurrentInTop10 = true;
          htmlTop += createAgentCardHTML(agent, isCurrent, index + 1, 'top');
        });
      }
      topList.innerHTML = htmlTop;

      // Блок "Ваша позиция" (если агент не попал в топ 10)
      if (boardData.current_agent && !isCurrentInTop10 && boardData.current_agent.rank > 0) {
        htmlPos = `
          <div class="section-title">${L.your_pos}</div>
          <div class="agents-list" style="margin-bottom: 32px;">
            ${createAgentCardHTML(boardData.current_agent, true, 0, 'pos')}
          </div>
        `;
      }
      posContainer.innerHTML = htmlPos;

      // Запускаем Count Up анимации после рендера DOM
      setTimeout(() => {
        if (boardData.top_agents) {
          boardData.top_agents.forEach(agent => {
            animateValue(`deals_top_${agent.rank}`, 0, agent.deals_count, 1000);
            animateValue(`earned_top_${agent.rank}`, 0, agent.earned, 1500);
          });
        }
        if (boardData.current_agent && !isCurrentInTop10) {
          animateValue(`deals_pos_${boardData.current_agent.rank}`, 0, boardData.current_agent.deals_count, 1000);
          animateValue(`earned_pos_${boardData.current_agent.rank}`, 0, boardData.current_agent.earned, 1500);
        }
      }, 100);
    }

    // Функция анимации чисел (Count Up)
    function animateValue(id, start, end, duration) {
      const obj = document.getElementById(id);
      if (!obj || end === 0) return;
      let startTimestamp = null;
      const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        // Форматируем вывод: если число целое, выводим без дробной части
        const currentVal = (progress * (end - start) + start);
        obj.innerHTML = Number.isInteger(end) ? Math.floor(currentVal) : currentVal.toFixed(1);
        
        if (progress < 1) window.requestAnimationFrame(step);
      };
      window.requestAnimationFrame(step);
    }

    // Старт
    window.onload = init;
  </script>
</body>
</html>
