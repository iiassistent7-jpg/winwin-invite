<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Win-Win | Зал Славы</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #1a1a2e;
      --bg-2: #0f0f1a;
      --accent-1: #56CCF2;
      --accent-2: #2F80ED;
      --text-muted: #a0a0b0;
      --card: rgba(255,255,255,0.05);
      --card-border: rgba(255,255,255,0.1);
      --success: #27AE60;
      --danger: #EB5757;
      --warning: #F2C94C;
      --gold: #FFD700;
      --silver: #C0C0C0;
      --bronze: #CD7F32;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: "Inter", sans-serif; }
    body { background: var(--bg-1); color: #fff; min-height: 100vh; display: flex; justify-content: center; }

    [dir="rtl"] { text-align: right; }
    [dir="rtl"] .agent-earned { text-align: left; }

    .shell { width: 100%; max-width: 600px; padding: 24px 16px 100px 16px; position: relative; }

    .lang-switcher { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .lang-btn { background: var(--card); border: 1px solid var(--card-border); color: var(--text-muted); border-radius: 20px; padding: 6px 12px; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .lang-btn.active { background: linear-gradient(135deg, rgba(86,204,242,0.2), rgba(47,128,237,0.2)); color: #fff; border-color: rgba(86,204,242,0.5); }

    .header { text-align: center; margin-bottom: 32px; }
    .logo { font-size: 2rem; font-weight: 800; background: linear-gradient(90deg, var(--accent-1), var(--accent-2)); -webkit-background-clip: text; color: transparent; margin-bottom: 4px; line-height: 1.2; }
    .page-title { font-size: 1.3rem; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 1px; }

    .section-title { font-size: 0.95rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; margin-top: 32px; }

    .agents-list { display: flex; flex-direction: column; gap: 12px; }

    .agent-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      opacity: 0;
      animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    .agent-card.highlight {
      background: linear-gradient(135deg, rgba(86,204,242,0.1), rgba(47,128,237,0.05));
      border-color: var(--accent-1);
      box-shadow: 0 0 15px rgba(86,204,242,0.2);
    }

    .agent-rank { width: 44px; height: 44px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border-radius: 14px; background: rgba(255,255,255,0.05); font-size: 1.2rem; font-weight: 800; color: var(--text-muted); }
    .rank-1 { background: rgba(255,215,0,0.15); color: var(--gold); border: 1px solid rgba(255,215,0,0.3); font-size: 1.5rem; }
    .rank-2 { background: rgba(192,192,192,0.15); color: var(--silver); border: 1px solid rgba(192,192,192,0.3); font-size: 1.5rem; }
    .rank-3 { background: rgba(205,127,50,0.15); color: var(--bronze); border: 1px solid rgba(205,127,50,0.3); font-size: 1.5rem; }

    .agent-info { flex: 1; }
    .agent-name { font-weight: 800; font-size: 1.05rem; color: #fff; margin-bottom: 4px; }
    .agent-deals { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }
    .agent-deals span { color: #fff; font-weight: 700; }

    .agent-earned { text-align: right; flex-shrink: 0; }
    .earned-lbl { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; }
    .earned-val { font-size: 1.15rem; font-weight: 800; color: var(--success); }

    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Bottom buttons ── */
    .bottom-actions {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 560px; display: flex; gap: 12px; z-index: 100;
    }
    /* IMPORTANT: flex:1 only inside bottom-actions, not globally */
    .bottom-actions .btn { flex: 1; }

    .btn {
      display: block; text-align: center; color: #fff; text-decoration: none;
      font-weight: 700; font-size: 1rem; padding: 16px; border-radius: 16px;
      transition: 0.2s; border: none; cursor: pointer;
      /* No flex:1 here — only inside bottom-actions */
    }
    .btn:active { transform: scale(0.96); }
    .btn-wa { background: #25D366; box-shadow: 0 8px 24px rgba(37,211,102,0.25); }
    .btn-tg { background: #2F80ED; box-shadow: 0 8px 24px rgba(47,128,237,0.25); }
    .btn-back-small { background: var(--card); border: 1px solid var(--card-border); color: var(--text-muted); padding: 12px 24px; border-radius: 14px; font-size: 0.9rem; }

    /* ── Loader & Error — matches business.html style exactly ── */
    .loading-overlay {
      position: fixed; inset: 0; background: var(--bg-1);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      z-index: 2000; padding: 32px; text-align: center;
    }
    .loader-brand {
      font-size: 2rem; font-weight: 800;
      background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text; color: transparent;
      margin-bottom: 8px;
    }
    .loader-sub { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 28px; font-weight: 600; }
    .spinner { border: 4px solid rgba(86,204,242,0.1); border-left-color: var(--accent-1); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error state — hidden until showError() fires */
    .err-block { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 320px; }
    .err-title {
      font-size: 1.3rem; font-weight: 800; color: var(--danger);
      margin-bottom: 12px; text-align: center;
    }
    .err-sub {
      font-size: 0.9rem; color: var(--text-muted); line-height: 1.5;
      font-weight: 500; margin-bottom: 32px; text-align: center;
    }
    /* Buttons inside error — proper size, not stretched */
    .err-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; max-width: 280px; padding: 14px 22px; border-radius: 14px;
      font-weight: 700; font-size: 0.95rem; text-decoration: none; color: #fff;
      border: none; cursor: pointer; margin-bottom: 12px;
    }
    .err-btn:last-child { margin-bottom: 0; }
    .err-btn:active { transform: scale(0.97); }
    .err-btn-wa { background: #25D366; box-shadow: 0 4px 16px rgba(37,211,102,0.25); }
    .err-btn-tg { background: #2F80ED; box-shadow: 0 4px 16px rgba(47,128,237,0.25); }
  </style>
</head>
<body>

  <!-- Loader / Error overlay -->
  <div class="loading-overlay" id="globalLoader">
    <div class="loader-brand">Win-Win</div>
    <div class="loader-sub" id="loaderText">Загрузка данных...</div>
    <div class="spinner" id="loaderSpinner"></div>

    <!-- Error block — hidden until showError() fires -->
    <div class="err-block" id="errBlock">
      <div class="err-title" id="t_err_title">Сессия истекла</div>
      <div class="err-sub"   id="t_err_sub">Вернитесь в мессенджер и получите новую ссылку.</div>
      <a href="#" class="err-btn err-btn-wa" id="errBtnWa" style="display:none;">
        <span id="t_err_btn_wa">WhatsApp</span>
      </a>
      <a href="https://t.me/winwin_lead_bot?start=link" class="err-btn err-btn-tg" id="errBtnTg" style="display:none;">
        <span id="t_err_btn_tg">Telegram</span>
      </a>
    </div>
  </div>

  <!-- Main content -->
  <div class="shell" style="display:none;" id="mainShell">

    <div class="lang-switcher">
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('he')">HE</button>
      <button class="lang-btn" onclick="setLang('ar')">AR</button>
      <button class="lang-btn active" onclick="setLang('ru')">RU</button>
    </div>

    <header class="header">
      <h1 class="logo">Win-Win</h1>
      <div class="page-title" id="t_title">🏆 Зал Славы</div>
    </header>

    <div id="yourPositionContainer"></div>

    <div class="section-title" id="t_top_agents">Топ агентов</div>
    <div class="agents-list" id="leaderboardList"></div>

    <!-- Back button (if opened from business cabinet) -->
    <div style="margin-top:32px; text-align:center;">
      <button class="btn btn-back-small" onclick="history.back()" id="t_btn_back">← Назад</button>
    </div>

    <!-- Bottom messenger buttons -->
    <div class="bottom-actions" id="btnGroup">
      <a href="#" class="btn btn-wa" id="btnWa" style="display:none;">WhatsApp</a>
      <a href="https://t.me/winwin_lead_bot" class="btn btn-tg" id="btnTg" style="display:none;">Telegram</a>
    </div>

  </div>

  <script>
    const i18n = {
      ru: { title:"🏆 Зал Славы", your_pos:"Ваша позиция", top_agents:"Топ агентов", deals:"Сделок:", earned:"Заработано", loading:"Загрузка...", expired:"Сессия истекла", expired_sub:"Вернитесь в мессенджер и получите новую ссылку.", wa:"WhatsApp", tg:"Telegram", btn_back:"← Назад" },
      en: { title:"🏆 Leaderboard", your_pos:"Your Position", top_agents:"Top Agents", deals:"Deals:", earned:"Earned", loading:"Loading...", expired:"Session expired", expired_sub:"Return to the messenger and get a new login link.", wa:"WhatsApp", tg:"Telegram", btn_back:"← Back" },
      he: { title:"🏆 היכל התהילה", your_pos:"המיקום שלך", top_agents:"הסוכנים המובילים", deals:"עסקאות:", earned:"הרוויח", loading:"טוען...", expired:"פג תוקפו של המושב", expired_sub:"חזור למסנג'ר וקבל קישור כניסה חדש.", wa:"WhatsApp", tg:"Telegram", btn_back:"← חזרה" },
      ar: { title:"🏆 قاعة المشاهير", your_pos:"مركزك", top_agents:"أفضل الوكلاء", deals:"صفقات:", earned:"المكتسبات", loading:"جاري التحميل...", expired:"انتهت الجلسة", expired_sub:"عد إلى المراسل واحصل على رابط دخول جديد.", wa:"WhatsApp", tg:"Telegram", btn_back:"← رجوع" }
    };

    let lang      = new URLSearchParams(window.location.search).get('lang') || 'ru';
    let token     = new URLSearchParams(window.location.search).get('token');
    let boardData = null;
    const API_URL = "https://amlatsa-bot-production.up.railway.app";

    function init() {
      if (i18n[lang]) setLang(lang, false);
      if (!token) { showError(); return; }
      fetchData();
    }

    function setLang(l, render = true) {
      lang = l;
      const isRTL = l === 'he' || l === 'ar';
      document.documentElement.lang = l;
      document.documentElement.dir = isRTL ? 'rtl' : 'ltr';
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      const btn = document.querySelector(\`.lang-btn[onclick="setLang('${l}')"]\`);
      if (btn) btn.classList.add('active');
      const L = i18n[l] || i18n.ru;
      const ids = { t_title:'title', t_top_agents:'top_agents', t_err_title:'expired', t_err_sub:'expired_sub', t_err_btn_wa:'wa', t_err_btn_tg:'tg', t_btn_back:'btn_back' };
      for (const [id, key] of Object.entries(ids)) {
        const el = document.getElementById(id); if (el) el.textContent = L[key];
      }
      document.getElementById('loaderText').textContent = L.loading;
      if (render && boardData) renderLeaderboard();
    }

    function showError() {
      // Hide loading indicators
      const spinner = document.getElementById('loaderSpinner');
      const txt     = document.getElementById('loaderText');
      if (spinner) spinner.style.display = 'none';
      if (txt)     txt.style.display     = 'none';
      // Show compact error block
      document.getElementById('errBlock').style.display = 'flex';
      // Determine channel
      const isTg    = boardData && boardData.channel === 'telegram';
      const btnWa   = document.getElementById('errBtnWa');
      const btnTg   = document.getElementById('errBtnTg');
      if (isTg) { if (btnTg) btnTg.style.display = 'flex'; }
      else       {
        const phone = (boardData && boardData.bot_phone) ? boardData.bot_phone : '972534218573';
        if (btnWa) { btnWa.href = 'https://wa.me/' + phone; btnWa.style.display = 'flex'; }
      }
    }

    async function fetchData() {
      try {
        const res = await fetch(API_URL + '/api/leaderboard?token=' + token);
        if (!res.ok) throw new Error('auth');
        boardData = await res.json();
        document.getElementById('globalLoader').style.display = 'none';
        document.getElementById('mainShell').style.display    = 'block';
        setupButtons();
        renderLeaderboard();
      } catch(e) {
        showError();
      }
    }

    function setupButtons() {
      const phone   = boardData.bot_phone || '972534218573';
      const channel = boardData.channel   || null;
      const btnWa   = document.getElementById('btnWa');
      const btnTg   = document.getElementById('btnTg');
      btnWa.href = 'https://wa.me/' + phone;
      if (channel === 'telegram') { btnTg.style.display = 'block'; }
      else if (channel === 'whatsapp') { btnWa.style.display = 'block'; }
      else { btnTg.style.display = 'block'; btnWa.style.display = 'block'; }
    }

    function createCardHTML(agent, isCurrent, idx, listType) {
      const L = i18n[lang] || i18n.ru;
      let badge = agent.rank, rankClass = '';
      if (agent.rank === 1) { badge = '🥇'; rankClass = 'rank-1'; }
      else if (agent.rank === 2) { badge = '🥈'; rankClass = 'rank-2'; }
      else if (agent.rank === 3) { badge = '🥉'; rankClass = 'rank-3'; }
      const delay    = idx * 0.08;
      const dealsId  = 'deals_' + listType + '_' + agent.rank;
      const earnedId = 'earned_' + listType + '_' + agent.rank;
      return \`
        <div class="agent-card ${isCurrent ? 'highlight' : ''}" style="animation-delay:${delay}s">
          <div class="agent-rank ${rankClass}">${badge}</div>
          <div class="agent-info">
            <div class="agent-name">${agent.name}</div>
            <div class="agent-deals">${L.deals} <span id="${dealsId}">0</span></div>
          </div>
          <div class="agent-earned">
            <div class="earned-lbl">${L.earned}</div>
            <div class="earned-val"><span id="${earnedId}">0</span> ₪</div>
          </div>
        </div>\`;
    }

    function renderLeaderboard() {
      const L            = i18n[lang] || i18n.ru;
      const topList      = document.getElementById('leaderboardList');
      const posContainer = document.getElementById('yourPositionContainer');
      let htmlTop = '', htmlPos = '', currentInTop = false;

      if (boardData.top_agents && boardData.top_agents.length) {
        boardData.top_agents.forEach((a, i) => {
          const isCur = boardData.current_agent && a.rank === boardData.current_agent.rank;
          if (isCur) currentInTop = true;
          htmlTop += createCardHTML(a, isCur, i + 1, 'top');
        });
      }
      topList.innerHTML = htmlTop;

      if (boardData.current_agent && !currentInTop && boardData.current_agent.rank > 0) {
        htmlPos = \`<div class="section-title">${L.your_pos}</div><div class="agents-list" style="margin-bottom:32px;">\${createCardHTML(boardData.current_agent, true, 0, 'pos')}</div>\`;
      }
      posContainer.innerHTML = htmlPos;

      // Count-up animation
      setTimeout(() => {
        (boardData.top_agents || []).forEach(a => {
          animNum('deals_top_' + a.rank,  0, a.deals_count, 1000);
          animNum('earned_top_' + a.rank, 0, a.earned,      1500);
        });
        if (boardData.current_agent && !currentInTop) {
          animNum('deals_pos_'  + boardData.current_agent.rank, 0, boardData.current_agent.deals_count, 1000);
          animNum('earned_pos_' + boardData.current_agent.rank, 0, boardData.current_agent.earned,      1500);
        }
      }, 100);
    }

    function animNum(id, start, end, dur) {
      const el = document.getElementById(id);
      if (!el || !end) return;
      const t0 = performance.now();
      const step = ts => {
        const p = Math.min((ts - t0) / dur, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        el.textContent = Number.isInteger(end) ? Math.floor(ease * (end - start) + start) : (ease * (end - start) + start).toFixed(1);
        if (p < 1) requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    }

    window.onload = init;
  </script>
</body>
</html>
