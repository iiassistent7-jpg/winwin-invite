<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Win-Win · Тарифы</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0F0F1A;--surface:rgba(255,255,255,.04);--surface2:rgba(255,255,255,.07);--border:rgba(255,255,255,.08);--text:#fff;--text2:#a0a0b0;--accent:#2F80ED;--accent2:#56CCF2;--gold:#F2C94C;--green:#27AE60;--radius:22px;--shadow:0 12px 34px rgba(0,0,0,.35)}
    *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,sans-serif;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center}
    .shell{width:100%;max-width:430px;padding:20px 16px 110px}
    .logo{font-family:Sora,sans-serif;font-size:2.1rem;font-weight:800;background:linear-gradient(90deg,var(--accent2),var(--accent));-webkit-background-clip:text;color:transparent;margin-bottom:10px}
    .top-sub{color:var(--text2);line-height:1.5;margin-bottom:16px}
    .currency-tabs{display:flex;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:4px;margin-bottom:16px}
    .currency-tab{flex:1;border:none;background:transparent;color:var(--text2);padding:10px;border-radius:10px;font-weight:800;cursor:pointer}
    .currency-tab.active{background:var(--surface2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .grid{display:grid;gap:14px}
    .plan-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:18px;box-shadow:var(--shadow)}
    .plan-card.pro{border-color:rgba(242,201,76,.28);background:linear-gradient(135deg,rgba(242,201,76,.08),rgba(255,255,255,.03))}
    .badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 12px;font-size:.78rem;font-weight:900;margin-bottom:12px}
    .badge.std{background:rgba(86,204,242,.12);color:var(--accent2);border:1px solid rgba(86,204,242,.2)}
    .badge.pro{background:rgba(242,201,76,.14);color:var(--gold);border:1px solid rgba(242,201,76,.22)}
    .plan-title{font-family:Sora,sans-serif;font-size:1.5rem;margin-bottom:8px}
    .plan-desc{color:var(--text2);line-height:1.55;font-size:.92rem;margin-bottom:14px}
    .plan-desc p{margin:0 0 10px}
    .plan-desc p:last-of-type{margin-bottom:0}
    .plan-desc ul{margin:0 0 12px 18px;padding:0}
    .plan-desc li{margin:0 0 4px}
    .option-list{display:grid;gap:10px;margin-bottom:14px}
    .option{border:1px solid var(--border);border-radius:16px;padding:14px;background:var(--surface2)}
    .option-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-end;margin-bottom:10px}
    .option-period{font-size:.9rem;font-weight:800}
    .option-price{font-size:1.45rem;font-weight:900}
    .option-note{font-size:.76rem;color:var(--text2);line-height:1.45;margin-bottom:12px}
    .btn{display:flex;justify-content:center;align-items:center;width:100%;padding:14px 16px;border-radius:14px;border:none;text-decoration:none;font-weight:800;font-size:.96rem;cursor:pointer}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-gold{background:linear-gradient(135deg,#F2C94C,#F2994A);color:#1A1A2E}
    .compare{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:18px;box-shadow:var(--shadow);margin-top:14px}
    .compare h3{font-family:Sora,sans-serif;font-size:1.1rem;margin-bottom:12px}
    .compare-table{width:100%;border-collapse:collapse;font-size:.82rem}
    .compare-table th,.compare-table td{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07);text-align:start;vertical-align:top}
    .compare-table td:last-child,.compare-table th:last-child{text-align:end}
    .ok{color:var(--green);font-weight:800}
    .footer-bar{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:430px;padding:12px 16px 18px;background:linear-gradient(180deg,rgba(15,15,26,0),rgba(15,15,26,.92) 30%,rgba(15,15,26,.98))}
    .back-btn{display:flex;justify-content:center;align-items:center;width:100%;padding:15px 16px;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);text-decoration:none;font-weight:800;box-shadow:var(--shadow)}
  </style>
</head>
<body>
  <div class="shell">
    <div class="logo">Win-Win</div>
    <div class="top-sub" id="topSub"></div>
    <div class="currency-tabs">
      <button class="currency-tab active" id="currencyIls" onclick="setCurrency('ils', this)"></button>
      <button class="currency-tab" id="currencyUsd" onclick="setCurrency('usd', this)"></button>
    </div>
    <div class="grid">
      <div class="plan-card">
        <div class="badge std" id="standardBadge"></div>
        <div class="plan-desc" id="standardDesc"></div>
        <div class="option-list" id="standardOptions"></div>
      </div>
      <div class="plan-card pro">
        <div class="badge pro" id="proBadge"></div>
        <div class="plan-desc" id="proDesc"></div>
        <div class="option-list" id="proOptions"></div>
      </div>
    </div>
    <div class="compare">
      <h3 id="compareTitle"></h3>
      <table class="compare-table">
        <tr><th id="compareHeadFeature"></th><th id="compareHeadStandard"></th><th id="compareHeadPro"></th></tr>
        <tbody id="compareRows"></tbody>
      </table>
    </div>
  </div>
  <div class="footer-bar"><a class="back-btn" id="backBtn" href="javascript:history.back()"></a></div>
<script>
  const TEXTS = {
    ru: {
      lang: 'ru',
      dir: 'ltr',
      title: 'Win-Win · Тарифы',
      topSub: 'Выберите тариф для бизнеса. Два уровня доступа: <b>Стандарт</b> и <b>PRO</b>. Чем длиннее срок, тем ниже стоимость месяца. Trust Index, место в каталоге и порядок выдачи не продаются.',
      currencyIls: '₪ Шекели',
      currencyUsd: '$ Доллары',
      standard: 'Стандарт',
      pro: 'PRO',
      standardLead: 'Для бизнеса, которому нужен понятный старт:',
      standardPoints: ['сделки', 'рекомендации', 'базовая аналитика', 'рабочий кабинет'],
      standardExtra: ['Первые 5 сделок — без комиссии платформы.', 'Вы платите только агентам по согласованным условиям.'],
      proLead: 'Для бизнеса, которому нужно больше инструментов:',
      proPoints: ['всё, что входит в тариф Стандарт', 'расширенная карточка', 'мини-лендинг внутри платформы', 'работа с рекомендателями'],
      proExtra: ['PRO не влияет на Trust Index, место в каталоге и порядок выдачи.'],
      compareTitle: 'Что даёт PRO сверх Стандарта',
      compareHeadFeature: 'Возможность',
      compareRows: [
        ['Каталог и сделки', 'Да', 'Да'],
        ['Базовая аналитика', 'Да', 'Да'],
        ['Лидеры в вашей нише', 'Ограничено', 'Полный доступ'],
        ['Контакты рекомендателей', 'Нет', 'Да'],
        ['Расширенная карточка бизнеса', 'База', 'Да'],
        ['Мини-лендинг бизнеса', 'Нет', 'Да']
      ],
      periods: { m1: '1 месяц', m6: '6 месяцев', m12: '12 месяцев' },
      insteadOf: 'вместо',
      savings: 'экономия',
      effectiveMonthly: 'в месяц',
      pay: 'Оплатить',
      back: 'Назад',
      payMessage: (plan, period) => `Здравствуйте! Хочу оплатить тариф ${plan} / ${period} в Win-Win.`
    },
    en: {
      lang: 'en',
      dir: 'ltr',
      title: 'Win-Win · Pricing',
      topSub: 'Choose the plan that fits your business. Two access levels: <b>Standard</b> and <b>PRO</b>. Longer terms lower the monthly cost. Trust Index, catalog placement, and ranking are not for sale.',
      currencyIls: '₪ ILS',
      currencyUsd: '$ USD',
      standard: 'Standard',
      pro: 'PRO',
      standardLead: 'For businesses that need a clear start:',
      standardPoints: ['deals', 'referrals', 'core analytics', 'working dashboard'],
      standardExtra: ['Your first 5 deals come with no platform commission.', 'You only pay agents under the agreed terms.'],
      proLead: 'For businesses that need more tools:',
      proPoints: ['everything included in Standard', 'expanded business profile', 'mini landing page inside the platform', 'work with referrers'],
      proExtra: ['PRO does not affect Trust Index, catalog placement, or ranking.'],
      compareTitle: 'What PRO adds beyond Standard',
      compareHeadFeature: 'Feature',
      compareRows: [
        ['Catalog and deals', 'Yes', 'Yes'],
        ['Core analytics', 'Yes', 'Yes'],
        ['Top businesses in your niche', 'Limited', 'Full access'],
        ['Referrer contacts', 'No', 'Yes'],
        ['Expanded business profile', 'Basic', 'Yes'],
        ['Business mini landing page', 'No', 'Yes']
      ],
      periods: { m1: '1 month', m6: '6 months', m12: '12 months' },
      insteadOf: 'instead of',
      savings: 'save',
      effectiveMonthly: 'per month',
      pay: 'Pay',
      back: 'Back',
      payMessage: (plan, period) => `Hello! I want to pay for the ${plan} plan / ${period} in Win-Win.`
    },
    he: {
      lang: 'he',
      dir: 'rtl',
      title: 'Win-Win · מחירים',
      topSub: 'בחרו את המסלול שמתאים לעסק שלכם. יש שתי רמות גישה: <b>סטנדרט</b> ו-<b>PRO</b>. ככל שהתקופה ארוכה יותר, העלות החודשית נמוכה יותר. Trust Index, מיקום בקטלוג וסדר הדירוג אינם למכירה.',
      currencyIls: '₪ שקלים',
      currencyUsd: '$ דולרים',
      standard: 'סטנדרט',
      pro: 'PRO',
      standardLead: 'לעסקים שצריכים התחלה ברורה:',
      standardPoints: ['עסקאות', 'המלצות', 'אנליטיקה בסיסית', 'לוח עבודה'],
      standardExtra: ['5 העסקאות הראשונות ללא עמלת פלטפורמה.', 'אתם משלמים רק לסוכנים לפי התנאים שסוכמו.'],
      proLead: 'לעסקים שצריכים יותר כלים:',
      proPoints: ['כל מה שכלול במסלול סטנדרט', 'כרטיס עסק מורחב', 'מיני-לנדינג בתוך הפלטפורמה', 'עבודה עם ממליצים'],
      proExtra: ['PRO לא משפיע על Trust Index, מיקום בקטלוג או סדר הדירוג.'],
      compareTitle: 'מה מקבלים ב-PRO מעבר לסטנדרט',
      compareHeadFeature: 'יכולת',
      compareRows: [
        ['קטלוג ועסקאות', 'כן', 'כן'],
        ['אנליטיקה בסיסית', 'כן', 'כן'],
        ['עסקים מובילים בתחום שלכם', 'מוגבל', 'גישה מלאה'],
        ['פרטי קשר של ממליצים', 'לא', 'כן'],
        ['כרטיס עסק מורחב', 'בסיסי', 'כן'],
        ['מיני-לנדינג לעסק', 'לא', 'כן']
      ],
      periods: { m1: 'חודש אחד', m6: '6 חודשים', m12: '12 חודשים' },
      insteadOf: 'במקום',
      savings: 'חיסכון של',
      effectiveMonthly: 'לחודש',
      pay: 'לתשלום',
      back: 'חזרה',
      payMessage: (plan, period) => `שלום! אני רוצה לשלם על מסלול ${plan} / ${period} ב-Win-Win.`
    },
    ar: {
      lang: 'ar',
      dir: 'rtl',
      title: 'Win-Win · الأسعار',
      topSub: 'اختر الباقة المناسبة لعملك. هناك مستويان: <b>القياسية</b> و<b>PRO</b>. كلما طالت المدة انخفضت الكلفة الشهرية. لا يمكن شراء Trust Index أو موقع الظهور في الدليل أو الترتيب.',
      currencyIls: '₪ شيكل',
      currencyUsd: '$ دولار',
      standard: 'القياسية',
      pro: 'PRO',
      standardLead: 'للأعمال التي تحتاج إلى بداية واضحة:',
      standardPoints: ['الصفقات', 'التوصيات', 'التحليلات الأساسية', 'لوحة عمل'],
      standardExtra: ['أول 5 صفقات بدون عمولة للمنصة.', 'أنتم تدفعون فقط للوكلاء وفق الشروط المتفق عليها.'],
      proLead: 'للأعمال التي تحتاج إلى أدوات أكثر:',
      proPoints: ['كل ما يتضمنه مسار القياسية', 'بطاقة نشاط موسعة', 'صفحة هبوط مصغرة داخل المنصة', 'العمل مع الموصين'],
      proExtra: ['باقة PRO لا تؤثر على Trust Index أو موقع الظهور في الدليل أو الترتيب.'],
      compareTitle: 'ماذا تضيف PRO فوق الباقة القياسية',
      compareHeadFeature: 'الميزة',
      compareRows: [
        ['الدليل والصفقات', 'نعم', 'نعم'],
        ['التحليلات الأساسية', 'نعم', 'نعم'],
        ['الأعمال الأبرز في مجالك', 'محدود', 'وصول كامل'],
        ['بيانات تواصل الموصين', 'لا', 'نعم'],
        ['بطاقة نشاط موسعة', 'أساسي', 'نعم'],
        ['صفحة هبوط مصغرة للنشاط', 'لا', 'نعم']
      ],
      periods: { m1: 'شهر واحد', m6: '6 أشهر', m12: '12 شهراً' },
      insteadOf: 'بدلاً من',
      savings: 'توفير',
      effectiveMonthly: 'شهرياً',
      pay: 'ادفع الآن',
      back: 'رجوع',
      payMessage: (plan, period) => `مرحباً! أريد دفع باقة ${plan} / ${period} في Win-Win.`
    }
  };

  const PRICING = {
    standard: {
      m1: { ils: '99 ₪', usd: '$29' },
      m6: { ils: '499 ₪', usd: '$149', instead: { ils: '594 ₪', usd: '$174' }, savings: { ils: '95 ₪', usd: '$25' }, monthly: { ils: '≈ 83 ₪', usd: '≈ $24.8' } },
      m12: { ils: '899 ₪', usd: '$279', instead: { ils: '1188 ₪', usd: '$348' }, savings: { ils: '289 ₪', usd: '$69' }, monthly: { ils: '≈ 75 ₪', usd: '≈ $23.3' } }
    },
    pro: {
      m1: { ils: '149 ₪', usd: '$49' },
      m6: { ils: '749 ₪', usd: '$249', instead: { ils: '894 ₪', usd: '$294' }, savings: { ils: '145 ₪', usd: '$45' }, monthly: { ils: '≈ 125 ₪', usd: '≈ $41.5' } },
      m12: { ils: '1349 ₪', usd: '$449', instead: { ils: '1788 ₪', usd: '$588' }, savings: { ils: '439 ₪', usd: '$139' }, monthly: { ils: '≈ 112 ₪', usd: '≈ $37.4' } }
    }
  };

  let currency = 'ils';
  let lang = 'ru';

  function detectLang() {
    const urlLang = new URLSearchParams(location.search).get('lang');
    if (urlLang && TEXTS[urlLang]) return urlLang;
    const n = navigator.language || '';
    if (n.startsWith('he') || n.startsWith('iw')) return 'he';
    if (n.startsWith('ar')) return 'ar';
    if (n.startsWith('ru') || n.startsWith('uk')) return 'ru';
    return 'en';
  }

  function buildNote(t, item) {
    if (!item.instead) return '';
    return `${t.insteadOf} ${item.instead[currency]}<br>${t.savings} ${item.savings[currency]}<br>${t.effectiveMonthly} ${item.monthly[currency]}`;
  }

  function buildPlanDesc(lead, points, extra) {
    const list = points.map(item => `<li>${item}</li>`).join('');
    const lines = extra.map(item => `<p>${item}</p>`).join('');
    return `<p>${lead}</p><ul>${list}</ul>${lines}`;
  }

  function getPlanItems(planKey) {
    const t = TEXTS[lang];
    const plan = PRICING[planKey];
    return [
      { period: t.periods.m1, price: plan.m1[currency], note: buildNote(t, plan.m1) },
      { period: t.periods.m6, price: plan.m6[currency], note: buildNote(t, plan.m6) },
      { period: t.periods.m12, price: plan.m12[currency], note: buildNote(t, plan.m12) }
    ];
  }

  function payLink(planKey, period){
    const t = TEXTS[lang];
    const text = encodeURIComponent(t.payMessage(t[planKey], period));
    return `https://wa.me/972534218573?text=${text}`;
  }

  function renderPlanOptions(containerId, items, planKey, pro=false){
    const t = TEXTS[lang];
    document.getElementById(containerId).innerHTML = items.map(item => `
      <div class="option">
        <div class="option-top"><div class="option-period">${item.period}</div><div class="option-price">${item.price}</div></div>
        ${item.note ? `<div class="option-note">${item.note}</div>` : ''}
        <a class="btn ${pro?'btn-gold':'btn-primary'}" href="${payLink(planKey, item.period)}" target="_blank">${t.pay}</a>
      </div>`).join('');
  }

  function renderCompareRows() {
    const t = TEXTS[lang];
    const goodValues = new Set(['Да', 'Yes', 'כן', 'نعم', 'Полный доступ', 'Full access', 'גישה מלאה', 'وصول كامل']);
    document.getElementById('compareRows').innerHTML = t.compareRows.map(row => `
      <tr><td>${row[0]}</td><td class="${goodValues.has(row[1]) ? 'ok' : ''}">${row[1]}</td><td class="${goodValues.has(row[2]) ? 'ok' : ''}">${row[2]}</td></tr>
    `).join('');
  }

  function applyLang() {
    const t = TEXTS[lang];
    document.documentElement.lang = t.lang;
    document.body.dir = t.dir;
    document.title = t.title;
    document.getElementById('topSub').innerHTML = t.topSub;
    document.getElementById('currencyIls').textContent = t.currencyIls;
    document.getElementById('currencyUsd').textContent = t.currencyUsd;
    document.getElementById('standardBadge').textContent = t.standard;
    document.getElementById('standardDesc').innerHTML = buildPlanDesc(t.standardLead, t.standardPoints, t.standardExtra);
    document.getElementById('proBadge').textContent = t.pro;
    document.getElementById('proDesc').innerHTML = buildPlanDesc(t.proLead, t.proPoints, t.proExtra);
    document.getElementById('compareTitle').textContent = t.compareTitle;
    document.getElementById('compareHeadFeature').textContent = t.compareHeadFeature;
    document.getElementById('compareHeadStandard').textContent = t.standard;
    document.getElementById('compareHeadPro').textContent = t.pro;
    document.getElementById('backBtn').textContent = t.back;
    renderCompareRows();
  }

  function render(){
    applyLang();
    renderPlanOptions('standardOptions', getPlanItems('standard'), 'standard');
    renderPlanOptions('proOptions', getPlanItems('pro'), 'pro', true);
  }

  function setCurrency(cur, btn){
    currency = cur;
    document.querySelectorAll('.currency-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }
  lang = detectLang();
  render();
</script>
</body>
</html>
