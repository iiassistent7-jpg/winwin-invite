<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Win-Win Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <style>
    :root { --bg-1: #1a1a2e; --bg-2: #0f0f1a; --accent-1: #4ca1af; --accent-2: #2c3e50; --text-muted: #a0a0b0; --card: rgba(255, 255, 255, 0.05); --card-border: rgba(255, 255, 255, 0.1); }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Inter", sans-serif; }
    body { background: var(--bg-1); color: #fff; min-height: 100vh; display: flex; justify-content: center; }
    .shell { width: 100%; max-width: 600px; padding: 24px 16px; position: relative; }
    
    .lang-switcher { display: flex; justify-content: center; gap: 10px; margin-bottom: 24px; }
    .lang-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-muted); border-radius: 20px; padding: 6px 14px; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .lang-btn.active { background: rgba(76, 161, 175, 0.2); border-color: var(--accent-1); color: #fff; }

    .header { text-align: center; margin-bottom: 32px; }
    .logo { font-size: 2.8rem; font-weight: 800; background: linear-gradient(90deg, #56CCF2, #2F80ED); -webkit-background-clip: text; color: transparent; margin-bottom: -4px; }
    .logo-sub { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.45em; color: var(--text-muted); margin-bottom: 20px; text-transform: uppercase; margin-left: 0.45em; }
    .subtitle { font-size: 1.15rem; font-weight: 700; color: #56CCF2; margin-bottom: 12px; }
    .mission { font-size: 0.95rem; color: #e0e0e0; line-height: 1.5; max-width: 95%; margin: 0 auto 16px auto; font-weight: 500; }
    .instruction-small { font-size: 0.8rem; color: var(--text-muted); max-width: 80%; margin: 0 auto; }

    .search-box { margin-top: 24px; }
    .search-box input { width: 100%; background: var(--card); border: 1px solid var(--card-border); color: #fff; padding: 16px 20px; border-radius: 16px; font-size: 1rem; outline: none; transition: 0.2s; }
    .search-box input:focus { border-color: #56CCF2; }
    .filters { display: flex; gap: 8px; overflow-x: auto; padding: 16px 0; scrollbar-width: none; }
    .filter-btn { background: var(--card); border: 1px solid var(--card-border); color: var(--text-muted); padding: 8px 16px; border-radius: 999px; cursor: pointer; white-space: nowrap; font-weight: 600; }
    .filter-btn.active { background: linear-gradient(135deg, rgba(86,204,242,0.2), rgba(47,128,237,0.2)); color: #fff; border-color: rgba(86,204,242,0.5); }

    .catalog-grid { display: flex; flex-direction: column; gap: 12px; }
    .biz-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 20px; padding: 20px; cursor: pointer; transition: 0.2s; }
    .biz-card:active { transform: scale(0.98); }
    .biz-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .biz-name { font-size: 1.2rem; font-weight: 800; }
    .biz-niche { font-size: 0.75rem; color: #56CCF2; background: rgba(86, 204, 242, 0.1); padding: 4px 8px; border-radius: 6px; font-weight: 700; max-width: 55%; text-align: right; }
    .biz-reward { display: inline-block; padding: 6px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; font-size: 0.85rem; font-weight: 700; color: #56CCF2; }

    .recommend-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; min-height: 100%; background: var(--bg-1); padding: 24px 16px; z-index: 10; animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .recommend-screen.active { display: block; }
    
    .btn-back { background: transparent; border: none; color: var(--text-muted); font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 24px; padding: 8px 0; }
    
    .rec-header-card { background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(0,0,0,0)); border: 1px solid var(--card-border); border-radius: 20px; padding: 24px 20px; margin-bottom: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .rec-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; line-height: 1.2; }
    .rec-tags { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .rec-tags .biz-niche { max-width: none; text-align: left; }
    .rec-stats { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 16px; background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 10px; display: inline-flex; }
    .rec-desc { font-size: 0.9rem; color: #e0e0e0; line-height: 1.5; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 16px; word-break: break-word; }
    
    .rec-desc a { color: #56CCF2; text-decoration: none; font-weight: 600; border-bottom: 1px dashed rgba(86,204,242,0.5); padding-bottom: 1px; transition: 0.2s; }
    .rec-desc a:hover { color: #2F80ED; border-color: #2F80ED; }

    .instruction-block { background: var(--card); border: 1px solid var(--card-border); border-radius: 20px; padding: 20px; margin-bottom: 16px; }
    .instruction-text { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px; font-weight: 500; line-height: 1.4; }
    
    .link-box { display: flex; gap: 8px; width: 100%; }
    .link-input { flex: 1 1 auto; min-width: 0; background: rgba(0,0,0,0.3); border: 1px solid var(--card-border); color: #fff; padding: 14px; border-radius: 12px; font-size: 0.85rem; outline: none; }
    .btn-copy { flex: 0 0 auto; white-space: nowrap; background: #2F80ED; border: none; color: #fff; font-weight: 700; padding: 0 20px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
    .btn-copy.copied { background: #27AE60; }
    
    .qr-container { text-align: center; padding: 16px; background: #fff; border-radius: 16px; display: inline-block; margin: 0 auto; box-shadow: 0 8px 24px rgba(255,255,255,0.1); }
    .btn-wa-return { display: block; width: 100%; text-align: center; background: #25D366; color: #fff; text-decoration: none; font-weight: 700; font-size: 1.1rem; padding: 16px; border-radius: 16px; margin-top: 24px; box-shadow: 0 8px 24px rgba(37, 211, 102, 0.25); }
  </style>
</head>
<body>
  <div class="shell">
    
    <div class="lang-switcher">
      <button class="lang-btn" id="btn_lang_en" onclick="setLang('en', true)">GB EN</button>
      <button class="lang-btn" id="btn_lang_he" onclick="setLang('he', true)">IL עב</button>
      <button class="lang-btn" id="btn_lang_ar" onclick="setLang('ar', true)">SA عر</button>
      <button class="lang-btn active" id="btn_lang_ru" onclick="setLang('ru', true)">RU РУ</button>
    </div>

    <div id="catalogView">
      <header class="header">
        <h1 class="logo">Win-Win</h1>
        <div class="logo-sub">N e t w o r k</div>
        <div class="subtitle" id="t_subtitle">Экосистема доверия</div>
        <p class="mission" id="t_mission">Найдите проверенный бизнес в каталоге и передайте рекомендацию. Ваш социальный капитал работает на вас.</p>
        <p class="instruction-small" id="t_instruction">начните вводить наименование бизнеса или нишу</p>
      </header>
      <div class="search-box"><input type="text" id="searchInput" placeholder="Поиск бизнеса или услуги..."></div>
      <div class="filters" id="nicheFilters"></div>
      <div class="catalog-grid" id="catalogGrid"><div style="text-align:center; padding:40px; color:var(--text-muted);" id="t_loading">Загрузка...</div></div>
    </div>

    <div id="recommendView" class="recommend-screen">
      <button class="btn-back" onclick="closeRecommend()" id="t_btn_back">← Вернуться к списку</button>
      
      <div class="rec-header-card">
          <div class="rec-title" id="recBizName"></div>
          <div class="rec-tags">
              <div class="biz-niche" id="recBizNiche"></div>
          </div>
          <div class="rec-stats" id="recBizStats"></div>
          
          <div class="rec-desc" id="recBizDesc"></div>
      </div>

      <div class="instruction-block">
        <div class="instruction-text" id="t_copy_link"></div>
        <div class="link-box">
          <input type="text" id="refLinkInput" class="link-input" readonly>
          <button class="btn-copy" id="copyBtn" onclick="copyLink()"></button>
        </div>
      </div>

      <div class="instruction-block" style="text-align: center;">
        <div class="instruction-text" id="t_scan_qr"></div>
        <div class="qr-container">
          <canvas id="qrCanvas"></canvas>
        </div>
      </div>
      
      <a href="#" id="waReturnLink" class="btn-wa-return" id="t_btn_wa"></a>
    </div>

  </div>

  <script>
    const i18n = {
      ru: { subtitle: "Экосистема доверия", mission: "Найдите проверенный бизнес в каталоге и передайте рекомендацию. Ваш социальный капитал работает на вас.", instruction: "начните вводить наименование бизнеса или нишу", search: "Поиск бизнеса или услуги...", loading: "Загрузка...", error_token: "Ошибка доступа", error_expired: "Ссылка устарела. Запросите каталог в боте.", not_found: "Ничего не найдено", btn_back: "← Вернуться к списку", copy_link: "🔗 Скопируйте и отправьте эту ссылку тому, кому хотите порекомендовать этот бизнес:", scan_qr: "📱 Или дайте отсканировать этот код, если человек находится рядом:", btn_copy: "Копировать", btn_copied: "Скопировано ✅", btn_wa: "Вернуться в WhatsApp", filter_all: "Все", bonus: "🎁 Бонус агенту:", refresh_btn: "🔄 Обновить каталог", refresh_hint: "Нажмите — откроется WhatsApp", trust_score: "Индекс доверия" },
      he: { subtitle: "מערכת אקולוגית של אמון", mission: "מצאו עסק מוכח בקטלוג והעבירו המלצה.", instruction: "התחילו להקליד שם עסק", search: "חיפוש...", loading: "טוען...", error_token: "שגיאה", error_expired: "הקישור פג תוקף.", not_found: "לא נמצא", btn_back: "← חזרה", copy_link: "🔗 העתיקו ושלחו את הקישור למי שתרצו להמליץ לו על העסק:", scan_qr: "📱 או תנו לו לסרוק את הקוד, אם הוא נמצא לידכם:", btn_copy: "העתק", btn_copied: "הועתק ✅", btn_wa: "חזרה ל-WhatsApp", filter_all: "הכל", bonus: "🎁 בונוס:", refresh_btn: "🔄 רענן", refresh_hint: "לחצו", trust_score: "מדד אמון" },
      en: { subtitle: "Ecosystem of Trust", mission: "Find a proven business in the catalog and share a recommendation.", instruction: "start typing business name or niche", search: "Search...", loading: "Loading...", error_token: "Access denied", error_expired: "Link expired. Request new catalog in bot.", not_found: "Nothing found", btn_back: "← Back", copy_link: "🔗 Copy and send this link to whoever you want to recommend this business to:", scan_qr: "📱 Or let them scan this code if they are nearby:", btn_copy: "Copy", btn_copied: "Copied ✅", btn_wa: "Return to WhatsApp", filter_all: "All", bonus: "🎁 Agent bonus:", refresh_btn: "🔄 Refresh", refresh_hint: "Tap to refresh", trust_score: "Trust Score" },
      ar: { subtitle: "نظام الثقة", mission: "ابحث عن عمل موثوق وشارك توصية.", instruction: "ابدأ بكتابة اسم العمل", search: "بحث...", loading: "جاري...", error_token: "خطأ", error_expired: "انتهت الصلاحية.", not_found: "لم يوجد", btn_back: "← رجوع", copy_link: "🔗 انسخ وأرسل هذا الرابط لمن تريد أن توصي بهذا العمل إليه:", scan_qr: "📱 أو دعه يمسح هذا الرمز إذا كان بجوارك:", btn_copy: "نسخ", btn_copied: "تم ✅", btn_wa: "العودة إلى WhatsApp", filter_all: "الكل", bonus: "🎁 مكافأة:", refresh_btn: "🔄 تحديث", refresh_hint: "اضغط", trust_score: "مؤشر الثقة" }
    };
    
    let currentLang = 'ru';
    
    function setLang(lang, isManualClick = false) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`btn_lang_${lang}`).classList.add('active');
      const L = i18n[lang];
      document.getElementById('t_subtitle').textContent = L.subtitle;
      document.getElementById('t_mission').textContent = L.mission;
      document.getElementById('t_instruction').textContent = L.instruction;
      document.getElementById('searchInput').placeholder = L.search;
      document.getElementById('t_btn_back').textContent = L.btn_back;
      document.getElementById('t_copy_link').textContent = L.copy_link;
      document.getElementById('t_scan_qr').textContent = L.scan_qr;
      document.getElementById('copyBtn').textContent = L.btn_copy;
      document.getElementById('waReturnLink').textContent = L.btn_wa;
      if (isManualClick) { extractNiches(); renderCatalog(); }
    }
    
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const paramLang = urlParams.get('lang');
    if (paramLang && i18n[paramLang]) { setLang(paramLang); } else { setLang('ru'); }
    
    const API_URL = "https://amlatsa-bot-production.up.railway.app";
    let allBusinesses = [];
    let agentId = null;
    let botPhone = "972534218573";
    let currentNiche = 'Все';
    
    async function loadCatalog() {
      if (!token) { document.getElementById('catalogGrid').innerHTML = `<div style="text-align:center; padding:40px;">${i18n[currentLang].error_token}</div>`; return; }
      try {
        const response = await fetch(`${API_URL}/api/catalog?token=${token}`);
        if (!response.ok) throw new Error('Token invalid');
        const data = await response.json();
        allBusinesses = data.businesses || [];
        agentId = data.agent_id;
        if (data.bot_phone) botPhone = data.bot_phone;
        document.getElementById('waReturnLink').href = `https://wa.me/${botPhone}`;
        extractNiches(); renderCatalog();
      } catch (err) {
        const refreshText = encodeURIComponent("1");
        const waRefreshUrl = `https://wa.me/${botPhone}?text=${refreshText}`;
        document.getElementById('catalogGrid').innerHTML = `
          <div style="text-align:center; padding:40px;">
            <div style="font-size:2rem; margin-bottom:16px;">⏳</div>
            <div style="color:var(--text-muted); margin-bottom:24px;">${i18n[currentLang].error_expired}</div>
            <a href="${waRefreshUrl}" style="display:inline-block; background:#25D366; color:#fff; font-weight:700; font-size:1rem; padding:14px 28px; border-radius:16px; text-decoration:none;">
              ${i18n[currentLang].refresh_btn}
            </a>
            <div style="font-size:0.8rem; color:var(--text-muted); margin-top:12px;">${i18n[currentLang].refresh_hint}</div>
          </div>`;
      }
    }
    
    function extractNiches() {
      const cats = [i18n[currentLang].filter_all];
      allBusinesses.forEach(biz => {
        if (biz.category && biz.category !== '—' && !cats.includes(biz.category)) cats.push(biz.category);
      });
      const container = document.getElementById('nicheFilters');
      container.innerHTML = '';
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `filter-btn ${cat === currentNiche || (cat === i18n[currentLang].filter_all && currentNiche === 'Все') ? 'active' : ''}`;
        btn.textContent = cat;
        btn.onclick = () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentNiche = cat === i18n[currentLang].filter_all ? 'Все' : cat;
          renderCatalog();
        };
        container.appendChild(btn);
      });
    }
    
    function renderCatalog() {
      const grid = document.getElementById('catalogGrid');
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allBusinesses.filter(biz => {
        const matchesSearch = biz.name.toLowerCase().includes(query)
          || (biz.business_info && biz.business_info.toLowerCase().includes(query))
          || (biz.category && biz.category.toLowerCase().includes(query))
          || (Array.isArray(biz.niche) ? biz.niche.some(n => n.toLowerCase().includes(query)) : (biz.niche && biz.niche.toLowerCase && biz.niche.toLowerCase().includes(query)));
        const matchesCat = (currentNiche === 'Все' || currentNiche === i18n[currentLang].filter_all || biz.category === currentNiche);
        return matchesSearch && matchesCat;
      });
      grid.innerHTML = '';
      if (filtered.length === 0) {
        grid.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-muted);">${i18n[currentLang].not_found}</div>`;
        return;
      }
      filtered.forEach(biz => {
        const card = document.createElement('div');
        card.className = 'biz-card';
        card.onclick = () => openRecommend(biz);
        const displayCat = biz.category || '';
        let displayNiche = '';
        if (Array.isArray(biz.niche) && biz.niche.length > 0) {
          if (biz.niche.length <= 2) {
            displayNiche = ' · ' + biz.niche.join(' • ');
          } else {
            displayNiche = ' · ' + biz.niche.slice(0, 2).join(', ') + ' +' + (biz.niche.length - 2);
          }
        } else if (typeof biz.niche === 'string' && biz.niche && biz.niche !== '—') {
          displayNiche = ' · ' + biz.niche;
        }
        const fullNicheText = `${displayCat}${displayNiche}`.trim() || 'Бизнес';
        card.innerHTML = `
          <div class="biz-header">
            <div class="biz-name">${biz.name}</div>
            <div class="biz-niche">${fullNicheText}</div>
          </div>
          <div class="biz-reward">${i18n[currentLang].bonus} ${biz.commission || '...'}</div>
        `;
        grid.appendChild(card);
      });
    }
    
    document.getElementById('searchInput').addEventListener('input', renderCatalog);
    
    function linkify(text) {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, function(url) {
            return '<a href="' + url + '" target="_blank">' + url + '</a>';
        });
    }
    
    function openRecommend(biz) {
      document.getElementById('catalogView').style.display = 'none';
      const recView = document.getElementById('recommendView');
      recView.classList.add('active');
      window.scrollTo(0, 0);
      
      document.getElementById('recBizName').textContent = biz.name;
      
      const displayCat = biz.category || '';
      let displayNiche = '';
      if (Array.isArray(biz.niche) && biz.niche.length > 0) {
        if (biz.niche.length <= 2) {
          displayNiche = ' · ' + biz.niche.join(' • ');
        } else {
          displayNiche = ' · ' + biz.niche.slice(0, 2).join(', ') + ' +' + (biz.niche.length - 2);
        }
      } else if (typeof biz.niche === 'string' && biz.niche && biz.niche !== '—') {
        displayNiche = ' · ' + biz.niche;
      }
      document.getElementById('recBizNiche').textContent = `${displayCat}${displayNiche}`.trim() || 'Бизнес';
      
      // Динамический рендеринг Индекса доверия
      const statsEl = document.getElementById('recBizStats');
      const trustLabel = i18n[currentLang].trust_score || "Индекс доверия";
      
      if (biz.trust_score !== undefined && biz.trust_score !== null && biz.trust_score !== 0) {
          statsEl.innerHTML = `<span style="color: #F2C94C; font-size: 1.1rem;">★</span> ${biz.trust_score}% <span style="opacity: 0.5; margin: 0 4px;">•</span> ${trustLabel}`;
      } else {
          statsEl.innerHTML = `<span style="color: var(--text-muted); font-size: 1.1rem;">★</span> — <span style="opacity: 0.5; margin: 0 4px;">•</span> ${trustLabel}`;
      }
      
      const descEl = document.getElementById('recBizDesc');
      if (biz.business_info) {
          descEl.innerHTML = linkify(biz.business_info);
          descEl.style.display = 'block';
      } else {
          descEl.style.display = 'none';
      }

      const link = `https://invite.winwinnetwork.pro/register.html?role=client&sender=${agentId}&receiver=${biz.id}&biz_name=${encodeURIComponent(biz.name)}&lang=${currentLang}`;
      document.getElementById('refLinkInput').value = link;
      
      const qrCanvas = document.getElementById('qrCanvas');
      const ctx = qrCanvas.getContext('2d');
      ctx.clearRect(0, 0, qrCanvas.width, qrCanvas.height);
      new QRious({ element: qrCanvas, value: link, size: 220, level: 'H' });
    }
    
    function closeRecommend() {
      document.getElementById('recommendView').classList.remove('active');
      document.getElementById('catalogView').style.display = 'block';
      const copyBtn = document.getElementById('copyBtn');
      copyBtn.textContent = i18n[currentLang].btn_copy;
      copyBtn.classList.remove('copied');
    }
    
    function copyLink() {
      const input = document.getElementById('refLinkInput');
      input.select();
      document.execCommand('copy');
      const btn = document.getElementById('copyBtn');
      btn.textContent = i18n[currentLang].btn_copied;
      btn.classList.add('copied');
    }
    
    loadCatalog();
  </script>
</body>
</html>
