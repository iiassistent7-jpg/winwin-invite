async function loadCatalog(){
  try{
    const res=await fetch(`${API_URL}/api/catalog?token=${encodeURIComponent(token)}`);
    if(!res.ok) throw new Error('catalog');
    const data=await res.json();
    catalogData=data||{};
    allBusinesses=data.businesses||[];
    actorId=data.agent_id||data.biz_id||data.business_id||null;
    renderFilters();
    renderSubfilters();
    renderCatalog();
  }catch(e){ document.getElementById('grid').innerHTML=`<div class="empty"><div class="empty-title">${L().empty}</div><div class="empty-sub">${L().empty_filtered_sub}</div></div>`; }
}
function cleanCatalogText(value){
  if(value==null) return '';
  const text=String(value).trim();
  if(!text || text==='ג€”' || text==='-') return '';
  return text;
}
function normalizeAliasKey(value){
  return cleanCatalogText(value).toLowerCase().replace(/[_/]+/g,' ').replace(/[^\p{L}\p{N}\s&()+-]+/gu,' ').replace(/\s+/g,' ').trim();
}
function slugAliasKey(value){
  return cleanCatalogText(value).toLowerCase().replace(/&/g,' and ').replace(/[^\p{L}\p{N}]+/gu,'_').replace(/^_+|_+$/g,'');
}
function firstFilledValue(values){
  return values.map(v=>typeof v==='string'?cleanCatalogText(v):v).find(v=>v!=null && v!=='' && !(Array.isArray(v)&&!v.length));
}
function extractObjectText(value){
  if(!value || typeof value!=='object' || Array.isArray(value)) return '';
  return cleanCatalogText(firstFilledValue([
    value.name,
    value.label,
    value.title,
    value.category,
    value.category_name,
    value.subcategory,
    value.subcategory_name,
    value.subniche,
    value.niche,
    value.slug,
    value.key,
    value.code
  ]));
}
function buildTaxonomyAliasMap(group){
  const map=new Map();
  Object.entries(group).forEach(([canonical, translations])=>{
    [canonical, ...(translations?Object.values(translations):[])].forEach(label=>{
      const key=normalizeAliasKey(label);
      const slug=slugAliasKey(label);
      if(key) map.set(key, canonical);
      if(slug) map.set(slug, canonical);
    });
  });
  return map;
}
const CATEGORY_ALIAS_MAP=buildTaxonomyAliasMap(TAXONOMY_LABELS.categories);
const SUBCATEGORY_ALIAS_MAP=buildTaxonomyAliasMap(TAXONOMY_LABELS.subcategories);
function getCanonicalTaxonomyValue(value,type){
  const cleaned=cleanCatalogText(value);
  if(!cleaned) return '';
  const map=type==='category'?CATEGORY_ALIAS_MAP:SUBCATEGORY_ALIAS_MAP;
  return map.get(normalizeAliasKey(cleaned)) || map.get(slugAliasKey(cleaned)) || cleaned;
}
function getTaxonomyLabel(value,type){
  const canonical=getCanonicalTaxonomyValue(value,type);
  if(!canonical) return '';
  if(lang==='ru') return canonical;
  const dict=type==='category'?TAXONOMY_LABELS.categories:TAXONOMY_LABELS.subcategories;
  return (dict[canonical] && dict[canonical][lang]) || canonical;
}
function getCategoryLabel(value){ return getTaxonomyLabel(value,'category'); }
function getSubcategoryLabel(value){ return getTaxonomyLabel(value,'subcategory'); }
function normalizeList(value){
  if(Array.isArray(value)) return value.flatMap(normalizeList);
  if(typeof value==='object') return normalizeList(extractObjectText(value));
  if(typeof value==='string') return value.split(',').map(v=>cleanCatalogText(v)).filter(Boolean);
  if(value==null) return [];
  return [cleanCatalogText(value)].filter(Boolean);
}
function uniqueTexts(values){
  const seen=new Set();
  return values.filter(Boolean).map(v=>cleanCatalogText(v)).filter(Boolean).filter(v=>{const key=normalizeAliasKey(v); if(seen.has(key)) return false; seen.add(key); return true;});
}
function getBusinessCategory(b){
  const values=uniqueTexts([
    ...normalizeList(b.category),
    ...normalizeList(b.category_name),
    ...normalizeList(b.main_category),
    ...normalizeList(b.parent_category),
    ...normalizeList(b.niche_category),
    ...normalizeList(b.niche_categories),
    ...normalizeList(b.categories)
  ]).map(v=>getCanonicalTaxonomyValue(v,'category'));
  return values.find(Boolean)||'';
}
function getBusinessSubcategories(b){
  const categoryKey=normalizeAliasKey(getBusinessCategory(b));
  const values=uniqueTexts([
    ...normalizeList(b.subcategories),
    ...normalizeList(b.subcategory),
    ...normalizeList(b.subcategory_name),
    ...normalizeList(b.specialization),
    ...normalizeList(b.specializations),
    ...normalizeList(b.speciality),
    ...normalizeList(b.specialities),
    ...normalizeList(b.subniche),
    ...normalizeList(b.subniches),
    ...normalizeList(b.niche),
    ...normalizeList(b.niches)
  ]).map(v=>getCanonicalTaxonomyValue(v,'subcategory'));
  return uniqueTexts(values).filter(v=>normalizeAliasKey(v)!==categoryKey);
}
function getCategoryTreeFromBackend(){
  const explicit=firstFilledValue([
    catalogData&&catalogData.categories,
    catalogData&&catalogData.catalog_categories,
    catalogData&&catalogData.category_tree,
    catalogData&&catalogData.filters&&catalogData.filters.categories
  ]);
  if(!Array.isArray(explicit)) return null;
  const tree=explicit.map(item=>{
    if(typeof item==='string'){
      const name=getCanonicalTaxonomyValue(item,'category');
      return name?{name,subcategories:TAXONOMY_SOURCE[name]||[]}:null;
    }
    if(!item||typeof item!=='object') return null;
    const name=getCanonicalTaxonomyValue(firstFilledValue([item.name,item.label,item.title,item.category,item.slug,item.key]),'category');
    const subcategories=uniqueTexts([
      ...normalizeList(item.subcategories),
      ...normalizeList(item.children),
      ...normalizeList(item.niches),
      ...normalizeList(item.subniches),
      ...normalizeList(item.items)
    ]).map(v=>getCanonicalTaxonomyValue(v,'subcategory'));
    return name?{name,subcategories}:null;
  }).filter(Boolean);
  return tree.length?tree:null;
}
function getAvailableCategories(){
  const explicit=getCategoryTreeFromBackend();
  if(explicit) return explicit.map(item=>item.name);
  const derived=uniqueTexts(allBusinesses.map(getBusinessCategory));
  return derived.length?derived:Object.keys(TAXONOMY_SOURCE);
}
function getAvailableSubcategories(category){
  if(!category||category==='__all__') return [];
  const explicit=getCategoryTreeFromBackend();
  if(explicit){
    const match=explicit.find(item=>item.name===category);
    if(match&&match.subcategories.length) return match.subcategories;
  }
  const derived=uniqueTexts(allBusinesses.filter(b=>getBusinessCategory(b)===category).flatMap(getBusinessSubcategories));
  return derived.length?derived:(TAXONOMY_SOURCE[category]||[]);
}
function getBusinessTaxonomyLine(b){
  const categoryLabel=getCategoryLabel(getBusinessCategory(b));
  const subcategoryLabels=getBusinessSubcategories(b).map(getSubcategoryLabel).filter(Boolean);
  if(categoryLabel && subcategoryLabels.length) return `${categoryLabel} · ${subcategoryLabels.slice(0,2).join(', ')}`;
  return categoryLabel || subcategoryLabels.slice(0,2).join(', ');
}
function renderFilters(){
  const t=L();
  const cats=[t.all,...getAvailableCategories()];
  if(currentCat!=='__all__' && !cats.includes(currentCat)) currentCat='__all__';
  const box=document.getElementById('filters');
  box.innerHTML='';
  cats.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='filter-btn'+(((cat===t.all&&currentCat==='__all__')||cat===currentCat)?' active':'');
    btn.textContent=(cat===t.all)?cat:getCategoryLabel(cat);
    btn.onclick=()=>{
      const nextCat=(cat===t.all?'__all__':cat);
      currentCat=nextCat;
      currentSubcat='__all__';
      renderFilters();
      renderSubfilters();
      renderCatalog();
    };
    box.appendChild(btn);
  });
}
function renderSubfilters(){
  const t=L();
  const wrap=document.getElementById('subfiltersWrap');
  const box=document.getElementById('subfilters');
  const subcats=getAvailableSubcategories(currentCat);
  if(!wrap||!box) return;
  if(currentCat==='__all__' || !subcats.length){
    wrap.style.display='none';
    box.innerHTML='';
    currentSubcat='__all__';
    return;
  }
  if(currentSubcat!=='__all__' && !subcats.includes(currentSubcat)) currentSubcat='__all__';
  wrap.style.display='block';
  box.innerHTML='';
  [t.all_subcats,...subcats].forEach(subcat=>{
    const btn=document.createElement('button');
    btn.className='subfilter-btn'+(((subcat===t.all_subcats&&currentSubcat==='__all__')||subcat===currentSubcat)?' active':'');
    btn.textContent=(subcat===t.all_subcats)?subcat:getSubcategoryLabel(subcat);
    btn.onclick=()=>{
      currentSubcat=(subcat===t.all_subcats?'__all__':subcat);
      renderSubfilters();
      renderCatalog();
    };
    box.appendChild(btn);
  });
}
function renderCatalog(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const filtered=allBusinesses.filter(b=>{
    const cat=getBusinessCategory(b);
    const subcats=getBusinessSubcategories(b);
    const matchCat=currentCat==='__all__'||cat===currentCat;
    const matchSubcat=currentSubcat==='__all__'||subcats.includes(currentSubcat);
    const hay=[b.name,b.business_info,cat,getCategoryLabel(cat),...subcats,...subcats.map(getSubcategoryLabel)].filter(Boolean).join(' ').toLowerCase();
    return matchCat && matchSubcat && hay.includes(q);
  });
  const grid=document.getElementById('grid');
  if(!filtered.length){
    grid.innerHTML=`<div class="empty"><div class="empty-title">${L().empty_filtered_title}</div><div class="empty-sub">${L().empty_filtered_sub}</div></div>`;
    return;
  }
  grid.innerHTML='';
  filtered.forEach(b=>{
    const card=document.createElement('div'); card.className='biz-card'; card.onclick=()=>openRecommend(b);
    const taxonomyLine=getBusinessTaxonomyLine(b);
    const categoryHtml=taxonomyLine?`<div class="biz-cat">${taxonomyLine}</div>`:'';
    card.innerHTML=`<div class="biz-top"><div><div class="biz-name">${b.name}</div>${categoryHtml}</div><div class="biz-bonus">🎁 ${L().bonus}: ${b.commission||'—'}</div></div><div class="biz-bottom"><div class="biz-trust">${L().card_trust}</div><div class="biz-cta">${L().card_cta}</div></div>`;
    grid.appendChild(card);
  });
}
function showNotice(msg){const n=document.getElementById('notice'); n.textContent=msg; n.style.opacity='1'; n.style.transform='translateX(-50%) translateY(0)'; clearTimeout(showNotice._t); showNotice._t=setTimeout(()=>{n.style.opacity='0'; n.style.transform='translateX(-50%) translateY(18px)';},1800);}

function openRecommend(b){
  currentBiz=b;
  const link=`https://invite.winwinnetwork.pro/register.html?role=client&sender=${encodeURIComponent(actorId)}&receiver=${encodeURIComponent(b.id)}&biz_name=${encodeURIComponent(b.name||'')}&lang=${encodeURIComponent(lang)}`;
  WinWinReferralShare.open({
    businessName:b.name||'—',
    categoryLabel:getBusinessTaxonomyLine(b),
    description:b.business_info||L().desc_fallback,
    link:link,
    copyLabel:L().copy_btn,
    screenId:'recommendScreen',
    nameId:'recBizName',
    nicheId:'recBizNiche',
    descId:'recBizDesc',
    inputId:'refLinkInput',
    copyBtnId:'copyBtn',
    qrCanvasId:'qrCanvas'
  });
}

function openInviteScreen(){
  if(!actorId) return;
  const link=`https://invite.winwinnetwork.pro/register.html?sender=${encodeURIComponent(actorId)}&lang=${encodeURIComponent(lang)}`;
  WinWinReferralShare.open({
    businessName:L().invite_title,
    categoryLabel:'',
    description:L().invite_desc,
    link:link,
    copyLabel:L().copy_btn,
    screenId:'inviteScreen',
    nameId:'inviteTitleValue',
    nicheId:'inviteHeaderTag',
    descId:'inviteDescValue',
    inputId:'inviteLinkInput',
    copyBtnId:'inviteCopyBtn',
    qrCanvasId:'inviteQrCanvas'
  });
}

function closeInviteScreen(){
  WinWinReferralShare.close({ screenId:'inviteScreen' });
}

function copyInviteLink(){
  WinWinReferralShare.copy({
    inputId:'inviteLinkInput',
    copyBtnId:'inviteCopyBtn',
    copiedLabel:L().copied
  });
}

function closeRecommend(){
  WinWinReferralShare.close({ screenId:'recommendScreen' });
}

function copyLink(){
  WinWinReferralShare.copy({
    inputId:'refLinkInput',
    copyBtnId:'copyBtn',
    copiedLabel:L().copied
  });
}
applyI18n(); loadCatalog();
