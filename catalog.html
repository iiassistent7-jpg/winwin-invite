<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Win-Win · Каталог</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0F0F1A;--surface:rgba(255,255,255,.04);--surface2:rgba(255,255,255,.07);--border:rgba(255,255,255,.08);--text:#fff;--text2:#a0a0b0;--accent:#2F80ED;--accent2:#56CCF2;--green:#27AE60;--gold:#F2C94C;--radius:22px;--shadow:0 12px 34px rgba(0,0,0,.35)}
    *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,sans-serif;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center}
    .app{width:100%;max-width:430px;min-height:100vh;padding:22px 16px 96px}
    .lang-row{display:flex;justify-content:center;gap:8px;margin-bottom:18px}
    .lang-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:999px;padding:8px 14px;font-size:.82rem;font-weight:800;cursor:pointer}
    .lang-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .logo{text-align:center;margin-bottom:12px}
    .logo-main{font-family:Sora,sans-serif;font-size:2.6rem;font-weight:800;background:linear-gradient(90deg,var(--accent2),var(--accent));-webkit-background-clip:text;color:transparent;line-height:1}
    .logo-sub{letter-spacing:.45em;font-size:.74rem;color:var(--text2);font-weight:800;margin-top:6px}
    .hero{text-align:center;margin-bottom:18px}
    .hero h1{font-size:1.05rem;font-weight:800;color:var(--accent2);margin-bottom:10px}
    .hero p{color:var(--text);line-height:1.45;font-size:.95rem;margin-bottom:6px}
    .hero .sub{color:var(--text2);font-size:.82rem}
    .search{position:relative;margin-bottom:14px}
    .search input{width:100%;padding:18px 18px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:1rem;outline:none}
    .search input::placeholder{color:var(--text2)}
    .filters{display:flex;gap:10px;overflow-x:auto;padding:2px 2px 14px;scrollbar-width:none;-webkit-overflow-scrolling:touch;margin-bottom:8px}
    .filters::-webkit-scrollbar{display:none}
    .filter-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:10px 16px;border-radius:999px;white-space:nowrap;font-weight:700;font-size:.84rem;cursor:pointer}
    .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .grid{display:flex;flex-direction:column;gap:12px}
    .biz-card{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:16px;box-shadow:var(--shadow);cursor:pointer}
    .biz-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .biz-name{font-size:1.14rem;font-weight:800;margin-bottom:4px}
    .biz-cat{color:var(--text2);font-size:.8rem;line-height:1.4}
    .biz-bonus{display:inline-flex;align-items:center;gap:6px;background:rgba(242,201,76,.12);border:1px solid rgba(242,201,76,.22);color:var(--gold);padding:6px 10px;border-radius:999px;font-size:.78rem;font-weight:800;white-space:nowrap}
    .empty{padding:36px 18px;text-align:center;color:var(--text2);font-weight:600}
    .sheet{position:fixed;inset:0;background:rgba(3,6,17,.62);display:none;align-items:flex-end;justify-content:center;padding:16px;z-index:50}
    .sheet.active{display:flex}
    .panel{width:100%;max-width:430px;background:#111527;border:1px solid var(--border);border-radius:28px 28px 24px 24px;padding:20px 18px 24px;box-shadow:0 24px 50px rgba(0,0,0,.55)}
    .handle{width:52px;height:5px;border-radius:999px;background:rgba(255,255,255,.14);margin:0 auto 16px}
    .panel h2{font-family:Sora,sans-serif;font-size:1.55rem;line-height:1.05;margin-bottom:8px}
    .panel p{color:var(--text2);line-height:1.55;font-size:.92rem;margin-bottom:10px}
    .chip{display:inline-flex;align-items:center;gap:6px;background:rgba(86,204,242,.1);border:1px solid rgba(86,204,242,.22);color:var(--accent2);padding:6px 12px;border-radius:999px;font-size:.78rem;font-weight:800;margin-bottom:12px}
    .actions{display:flex;flex-direction:column;gap:10px;margin-top:14px}
    .btn{display:flex;justify-content:center;align-items:center;width:100%;padding:16px;border-radius:16px;text-decoration:none;font-weight:800;font-size:1rem;border:none;cursor:pointer}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
    .tiny{color:var(--text2);font-size:.76rem;line-height:1.45}
    .notice{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(18px);opacity:0;pointer-events:none;transition:.22s;background:#171d31;color:#fff;border:1px solid rgba(255,255,255,.1);padding:12px 14px;border-radius:14px;z-index:70;box-shadow:0 16px 34px rgba(0,0,0,.35)}
    .sticky-back{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);width:calc(100% - 32px);max-width:398px;z-index:60;display:flex;justify-content:center}
    .sticky-back .btn{box-shadow:0 10px 24px rgba(0,0,0,.28)}
  </style>
</head>
<body>
<div class="app">
  <div class="lang-row">
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" data-lang="he" onclick="setLang('he')">HE</button>
    <button class="lang-btn" data-lang="ar" onclick="setLang('ar')">AR</button>
    <button class="lang-btn active" data-lang="ru" onclick="setLang('ru')">RU</button>
  </div>
  <div class="logo">
    <div class="logo-main">Win-Win</div>
    <div class="logo-sub">NETWORK</div>
  </div>
  <div class="hero">
    <h1 id="t_head">Экосистема доверия</h1>
    <p id="t_sub1">Найдите проверенный бизнес в каталоге и передайте рекомендацию.</p>
    <p class="sub" id="t_sub2">Ваш социальный капитал работает на вас.</p>
  </div>
  <div class="search"><input id="q" type="text" placeholder="Поиск бизнеса или услуги..." oninput="renderCatalog()"></div>
  <div class="filters" id="filters"></div>
  <div class="grid" id="grid"><div class="empty">Загрузка каталога...</div></div>
</div>
<div class="sheet" id="sheet" onclick="closeSheet(event)">
  <div class="panel" onclick="event.stopPropagation()">
    <div class="handle"></div>
    <div class="chip" id="sheetChip">Категория</div>
    <h2 id="sheetName">—</h2>
    <p id="sheetDesc">—</p>
    <div class="tiny" id="sheetBonus"></div>
    <div class="actions">
      <button class="btn btn-primary" id="copyBtn" onclick="copyReferralLink()">Скопировать ссылку для рекомендации</button>
      <button class="btn btn-outline" onclick="closeSheet()">Назад</button>
    </div>
  </div>
</div>
<div class="sticky-back"><button class="btn btn-outline" onclick="history.back()" id="stickyBackBtn">Назад</button></div>
<div class="notice" id="notice"></div>
<script>
const API_URL='https://amlatsa-bot-production.up.railway.app';
const token=new URLSearchParams(location.search).get('token')||'';
let lang=new URLSearchParams(location.search).get('lang')||'ru';
let allBusinesses=[]; let currentCat='__all__'; let actorId=null; let currentBiz=null;
const FALLBACK_CATEGORIES={ru:['Красота','Медицина','Недвижимость','Юристы','Услуги','B2B'],en:['Beauty','Medicine','Real Estate','Legal','Services','B2B'],he:['יופי','רפואה','נדל"ן','משפטים','שירותים','B2B'],ar:['الجمال','الطب','العقارات','القانون','الخدمات','B2B']};
const i18n={
 ru:{head:'Экосистема доверия',sub1:'Найдите проверенный бизнес в каталоге и передайте рекомендацию.',sub2:'Ваш социальный капитал работает на вас.',search:'Поиск бизнеса или услуги...',all:'Все',empty:'Ничего не найдено',loading:'Загрузка каталога...',copy:'Скопировать ссылку для рекомендации',copied:'Ссылка скопирована ✅',back:'Назад',bonus:'Бонус',invite:'Пригласить бизнес в Win-Win'},
 en:{head:'Trust ecosystem',sub1:'Find a verified business and pass on a recommendation.',sub2:'Let your social capital work for you.',search:'Search for a business or service...',all:'All',empty:'Nothing found',loading:'Loading catalog...',copy:'Copy referral link',copied:'Referral link copied ✅',back:'Back',bonus:'Bonus',invite:'Invite business to Win-Win'},
 he:{head:'אקוסיסטם של אמון',sub1:'מצאו עסק מאומת בקטלוג והעבירו המלצה.',sub2:'ההון החברתי שלכם עובד עבורכם.',search:'חיפוש עסק או שירות...',all:'הכול',empty:'לא נמצאו תוצאות',loading:'טוען קטלוג...',copy:'העתק קישור להמלצה',copied:'הקישור הועתק ✅',back:'חזרה',bonus:'בונוס',invite:'להזמין עסק ל‑Win‑Win'},
 ar:{head:'منظومة الثقة',sub1:'اعثر على نشاط موثوق في الكتالوج وقدّم توصية.',sub2:'رأس مالك الاجتماعي يعمل لصالحك.',search:'ابحث عن نشاط أو خدمة...',all:'الكل',empty:'لم يتم العثور على نتائج',loading:'جارٍ تحميل الكتالوج...',copy:'انسخ رابط التوصية',copied:'تم نسخ الرابط ✅',back:'رجوع',bonus:'مكافأة',invite:'ادعُ نشاطاً إلى Win‑Win'}
};
function L(){return i18n[lang]||i18n.ru}
function setLang(l){lang=l;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active', b.dataset.lang===l));applyI18n();renderFilters();renderCatalog();}
function applyI18n(){document.documentElement.lang=lang;const t=L();document.getElementById('t_head').textContent=t.head;document.getElementById('t_sub1').textContent=t.sub1;document.getElementById('t_sub2').textContent=t.sub2;document.getElementById('q').placeholder=t.search;document.getElementById('copyBtn').textContent=t.copy;document.getElementById('stickyBackBtn').textContent=t.back;}
async function loadCatalog(){
  try{
    const res=await fetch(`${API_URL}/api/catalog?token=${encodeURIComponent(token)}`);
    if(!res.ok) throw new Error('catalog');
    const data=await res.json();
    allBusinesses=data.businesses||[]; actorId=data.agent_id||data.biz_id||data.business_id||null;
    renderFilters(); renderCatalog();
  }catch(e){ document.getElementById('grid').innerHTML=`<div class="empty">${L().empty}</div>`; }
}
function categoryOf(b){return b.category || (Array.isArray(b.niche)&&b.niche.length?b.niche[0]:'—');}
function renderFilters(){
  const t=L();
  const inferred=[...new Set(allBusinesses.map(categoryOf).filter(Boolean))];
  const fallback=FALLBACK_CATEGORIES[lang]||FALLBACK_CATEGORIES.ru;
  const cats=[t.all,...(inferred.length?inferred:fallback)];
  const box=document.getElementById('filters');
  box.innerHTML='';
  cats.forEach(cat=>{const btn=document.createElement('button'); btn.className='filter-btn'+(((cat===t.all&&currentCat==='__all__')||cat===currentCat)?' active':''); btn.textContent=cat; btn.onclick=()=>{currentCat=(cat===t.all?'__all__':cat); renderFilters(); renderCatalog();}; box.appendChild(btn);});
}
function renderCatalog(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const filtered=allBusinesses.filter(b=>{
    const cat=categoryOf(b);
    const matchCat=currentCat==='__all__'||cat===currentCat;
    const hay=[b.name,b.business_info,cat,Array.isArray(b.niche)?b.niche.join(' '):b.niche].filter(Boolean).join(' ').toLowerCase();
    return matchCat && hay.includes(q);
  });
  const grid=document.getElementById('grid');
  if(!filtered.length){grid.innerHTML=`<div class="empty">${L().empty}</div>`; return;}
  grid.innerHTML='';
  filtered.forEach(b=>{
    const card=document.createElement('div'); card.className='biz-card'; card.onclick=()=>openBiz(b);
    const cat=categoryOf(b); const niche=Array.isArray(b.niche)&&b.niche.length?(' · '+b.niche.slice(0,2).join(', ')):'';
    card.innerHTML=`<div class="biz-top"><div><div class="biz-name">${b.name}</div><div class="biz-cat">${cat}${niche}</div></div><div class="biz-bonus">🎁 ${L().bonus}: ${b.commission||'—'}</div></div>`;
    grid.appendChild(card);
  });
}
function openBiz(b){currentBiz=b; document.getElementById('sheetName').textContent=b.name||'—'; document.getElementById('sheetChip').textContent=categoryOf(b); document.getElementById('sheetDesc').textContent=b.business_info||'У этого бизнеса пока нет дополнительного описания.'; document.getElementById('sheetBonus').textContent=`${L().bonus}: ${b.commission||'—'}`; document.getElementById('sheet').classList.add('active');}
function closeSheet(e){if(e && e.target!==document.getElementById('sheet')) return; document.getElementById('sheet').classList.remove('active');}
function showNotice(msg){const n=document.getElementById('notice'); n.textContent=msg; n.style.opacity='1'; n.style.transform='translateX(-50%) translateY(0)'; clearTimeout(showNotice._t); showNotice._t=setTimeout(()=>{n.style.opacity='0'; n.style.transform='translateX(-50%) translateY(18px)';},1800);}
async function copyReferralLink(){
  if(!currentBiz || !actorId) return;
  const link=`https://invite.winwinnetwork.pro/register.html?role=client&sender=${encodeURIComponent(actorId)}&receiver=${encodeURIComponent(currentBiz.id)}&biz_name=${encodeURIComponent(currentBiz.name||'')}&lang=${encodeURIComponent(lang)}`;
  try{await navigator.clipboard.writeText(link);}catch(e){const ta=document.createElement('textarea');ta.value=link;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();}
  showNotice(L().copied);
}
applyI18n(); loadCatalog();
</script>
</body>
</html>
