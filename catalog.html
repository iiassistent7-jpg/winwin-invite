<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Win-Win Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <style>
    :root { --bg-1: #1a1a2e; --bg-2: #0f0f1a; --accent-1: #4ca1af; --accent-2: #2c3e50; --text-muted: #a0a0b0; --card: rgba(255, 255, 255, 0.05); --card-border: rgba(255, 255, 255, 0.1); }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Inter", sans-serif; }
    body { background: var(--bg-1); color: #fff; min-height: 100vh; display: flex; justify-content: center; }
    .shell { width: 100%; max-width: 600px; padding: 24px 16px; position: relative; }
    
    .lang-switcher { display: flex; justify-content: center; gap: 10px; margin-bottom: 24px; }
    .lang-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-muted); border-radius: 20px; padding: 6px 14px; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .lang-btn.active { background: rgba(76, 161, 175, 0.2); border-color: var(--accent-1); color: #fff; }

    .header { text-align: center; margin-bottom: 32px; }
    .logo { font-size: 2.8rem; font-weight: 800; background: linear-gradient(90deg, #56CCF2, #2F80ED); -webkit-background-clip: text; color: transparent; margin-bottom: -4px; }
    .logo-sub { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.45em; color: var(--text-muted); margin-bottom: 20px; text-transform: uppercase; margin-left: 0.45em; }
    .subtitle { font-size: 1.15rem; font-weight: 700; color: #56CCF2; margin-bottom: 12px; }
    .mission { font-size: 0.95rem; color: #e0e0e0; line-height: 1.5; max-width: 95%; margin: 0 auto 16px auto; font-weight: 500; }
    .instruction-small { font-size: 0.8rem; color: var(--text-muted); max-width: 80%; margin: 0 auto; }

    .search-box { margin-top: 24px; }
    .search-box input { width: 100%; background: var(--card); border: 1px solid var(--card-border); color: #fff; padding: 16px 20px; border-radius: 16px; font-size: 1rem; outline: none; transition: 0.2s; }
    .search-box input:focus { border-color: #56CCF2; }
    .filters { display: flex; gap: 8px; overflow-x: auto; padding: 16px 0; scrollbar-width: none; }
    .filter-btn { background: var(--card); border: 1px solid var(--card-border); color: var(--text-muted); padding: 8px 16px; border-radius: 999px; cursor: pointer; white-space: nowrap; font-weight: 600; }
    .filter-btn.active { background: linear-gradient(135deg, rgba(86,204,242,0.2), rgba(47,128,237,0.2)); color: #fff; border-color: rgba(86,204,242,0.5); }

    .catalog-grid { display: flex; flex-direction: column; gap: 12px; }
    .biz-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 20px; padding: 20px; cursor: pointer; transition: 0.2s; }
    .biz-card:active { transform: scale(0.98); }
    .biz-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .biz-name { font-size: 1.2rem; font-weight: 800; }
    .biz-niche { font-size: 0.75rem; color: #56CCF2; background: rgba(86, 204, 242, 0.1); padding: 4px 8px; border-radius: 6px; font-weight: 700; }
    .biz-reward { display: inline-block; padding: 6px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; font-size: 0.85rem; font-weight: 700; color: #56CCF2; }

    .recommend-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; min-height: 100%; background: var(--bg-1); padding: 24px 16px; z-index: 10; animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .recommend-screen.active { display: block; }
    
    .btn-back { background: transparent; border: none; color: var(--text-muted); font-size: 1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 24px; }
    .rec-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
    
    /* УМЕНЬШЕН ПАДДИНГ ДЛЯ МОБИЛОК */
    .instruction-block { background: var(--card); border: 1px solid var(--card-border); border-radius: 20px; padding: 16px; margin-bottom: 16px; }
    .instruction-text { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px; font-weight: 500; }
    
    /* ИСПРАВЛЕННЫЙ БЛОК ССЫЛКИ (АДАПТИВНЫЙ ПЕРЕНОС) */
    .link-box { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; }
    .link-input { flex: 1 1 200px; background: rgba(0,0,0,0.2); border: 1px solid var(--card-border); color: #fff; padding: 12px; border-radius: 12px; font-size: 0.85rem; outline: none; min-width: 0; }
    .btn-copy { flex: 1 0 fit-content; min-width: 100px; background: #2F80ED; border: none; color: #fff; font-weight: 700; padding: 12px 16px; border-radius: 12px; cursor: pointer; transition: 0.2s; text-align: center; }
