<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Win-Win · Кабинет</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg:#0F0F1A; --surface:rgba(255,255,255,0.06); --surface2:rgba(255,255,255,0.1);
            --text:#FFFFFF; --text2:#A0A0B0; --border:rgba(255,255,255,0.08);
            --accent1:#56CCF2; --accent2:#2F80ED; --gold:#F2C94C; --green:#27AE60;
            --radius:24px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        .app { max-width:430px; margin:0 auto; min-height:100vh; padding-bottom:80px; }
        
        .header { padding:24px 20px 12px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:var(--bg); z-index:50; }
        .logo { font-family:'Sora',sans-serif; font-size:1.45rem; font-weight:800; background:linear-gradient(90deg,var(--accent1),var(--accent2)); -webkit-background-clip:text; color:transparent; }
        
        .metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; padding:0 16px; margin-bottom:28px; }
        .metric-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 14px; text-align:center; backdrop-filter:blur(12px); }
        .metric-label { font-size:0.8rem; color:var(--text2); font-weight:600; }
        .metric-value { font-family:'Sora',sans-serif; font-size:2rem; font-weight:800; margin:6px 0 4px; }
        
        .cta-big { 
            margin:0 16px 32px; 
            background:linear-gradient(135deg,var(--accent1),var(--accent2)); 
            color:#fff; 
            font-size:1.2rem; 
            font-weight:800; 
            padding:24px 20px; 
            border-radius:24px; 
            text-align:center; 
            box-shadow:0 12px 32px rgba(47,128,237,.35); 
            cursor:pointer; 
            transition:.3s; 
        }
        .cta-big:active { transform:scale(0.96); }
        
        .funnel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin:0 16px 28px; }
        .funnel-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
        .funnel-row:last-child { margin-bottom:0; }
        .funnel-lbl { width:80px; font-size:0.78rem; font-weight:600; color:var(--text2); }
        .funnel-track { flex:1; height:10px; background:var(--surface2); border-radius:999px; overflow:hidden; }
        .funnel-fill { height:100%; border-radius:999px; transition:width 1s ease; }
        
        .section-title { padding:0 20px; font-size:0.95rem; font-weight:700; color:var(--text2); margin:20px 0 12px; text-transform:uppercase; letter-spacing:0.5px; }
        
        .nav { position:fixed; bottom:0; left:0; right:0; max-width:430px; margin:0 auto; background:var(--surface); border-top:1px solid var(--border); display:flex; padding:8px 0; z-index:100; }
        .nav-item { flex:1; text-align:center; padding:8px; color:var(--text2); font-size:0.75rem; font-weight:600; }
        .nav-item.active { color:var(--accent2); }
        
        .view { display:none; padding:0 16px; }
        .view.active { display:block; }
        
        .empty { text-align:center; padding:40px 20px; color:var(--text2); font-size:0.95rem; }
    </style>
</head>
<body>

<div class="app">

    <!-- HEADER -->
    <div class="header">
        <div class="logo">Win-Win</div>
        <div onclick="setLangPrompt()" style="font-size:1.1rem;cursor:pointer;">🇷🇺</div>
    </div>

    <!-- HOME VIEW -->
    <div id="view-home" class="view active">

        <!-- Метрики -->
        <div class="metrics">
            <div class="metric-card">
                <div class="metric-label">КАПИТАЛ</div>
                <div class="metric-value" id="v_earned">0</div>
                <div style="font-size:0.85rem;color:var(--gold);">₪</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">СДЕЛКИ</div>
                <div class="metric-value" id="v_deals">0</div>
                <div style="font-size:0.85rem;color:var(--accent2);">закрыто</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">ОЖИДАЕТСЯ</div>
                <div class="metric-value" id="v_pending" style="color:var(--gold);">0</div>
                <div style="font-size:0.85rem;">₪</div>
            </div>
        </div>

        <!-- Большая кнопка -->
        <div onclick="openCatalogFromHome()" class="cta-big">
            У меня друг которому нужна рекомендация
            <div style="margin-top:8px;font-size:0.9rem;opacity:0.9;font-weight:500;">Открыть каталог →</div>
        </div>

        <!-- Компактная воронка -->
        <div class="funnel">
            <div style="display:flex;justify-content:space-between;margin-bottom:16px;font-weight:700;">
                <span>Воронка рекомендаций</span>
                <span id="v_conv" style="color:var(--green);">0%</span>
            </div>
            <div class="funnel-row">
                <div class="funnel-lbl">В работе</div>
                <div class="funnel-track"><div id="bar_active" class="funnel-fill" style="background:#56CCF2;width:0%"></div></div>
                <div id="st_active" style="width:32px;text-align:right;font-weight:700;">0</div>
            </div>
            <div class="funnel-row">
                <div class="funnel-lbl">Закрыто</div>
                <div class="funnel-track"><div id="bar_closed" class="funnel-fill" style="background:#27AE60;width:0%"></div></div>
                <div id="st_closed" style="width:32px;text-align:right;font-weight:700;">0</div>
            </div>
            <div class="funnel-row">
                <div class="funnel-lbl">Отклонено</div>
                <div class="funnel-track"><div id="bar_rejected" class="funnel-fill" style="background:#EB5757;width:0%"></div></div>
                <div id="st_rejected" style="width:32px;text-align:right;font-weight:700;">0</div>
            </div>
        </div>

        <!-- Последние рекомендации -->
        <div class="section-title">Последние рекомендации</div>
        <div id="activityList"></div>

    </div>

    <!-- Другие вкладки (Каталог, Сделки, Профиль) — оставил минимально, можешь добавить свой контент -->
    <div id="view-catalog" class="view">Каталог (твой существующий код)</div>
    <div id="view-deals" class="view">Сделки (твой существующий код)</div>
    <div id="view-profile" class="view">Профиль (твой существующий код)</div>

    <!-- Нижняя навигация -->
    <div class="nav">
        <div onclick="switchTab(0)" class="nav-item active" id="nav-home">🏠</div>
        <div onclick="switchTab(1)" class="nav-item" id="nav-catalog">📋</div>
        <div onclick="switchTab(2)" class="nav-item" id="nav-deals">📦</div>
        <div onclick="switchTab(3)" class="nav-item" id="nav-profile">👤</div>
    </div>

</div>

<script>
// ==================== ТВОЯ ЛОГИКА (сокращённо) ====================
let dashData = {};
let lang = 'ru';

// Переключение вкладок
function switchTab(n) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    
    if (n === 0) document.getElementById('view-home').classList.add('active');
    else if (n === 1) document.getElementById('view-catalog').classList.add('active');
    else if (n === 2) document.getElementById('view-deals').classList.add('active');
    else if (n === 3) document.getElementById('view-profile').classList.add('active');
    
    document.getElementById(['nav-home','nav-catalog','nav-deals','nav-profile'][n]).classList.add('active');
}

// Главная кнопка CTA
function openCatalogFromHome() {
    switchTab(1); // переключаемся на Каталог
    if (typeof loadCatalog === 'function') loadCatalog();
}

// Пример renderAll (подставь свой полный renderAll сюда, если нужно)
function renderAll() {
    const d = dashData;
    animNum('v_earned', Math.round(d.total_earned || 0));
    document.getElementById('v_deals').textContent = d.success_deals || 0;
    document.getElementById('v_pending').textContent = Math.round(d.pending_payout || 0) + ' ₪';
    
    const total = (d.active_deals||0) + (d.success_deals||0) + (d.rejected_deals||0);
    document.getElementById('v_conv').textContent = (total ? Math.round((d.success_deals||0)/total*100) : 0) + '%';
    
    // Анимация баров
    setTimeout(() => {
        document.getElementById('bar_active').style.width = (total ? (d.active_deals||0)/total*100 : 0) + '%';
        document.getElementById('bar_closed').style.width = (total ? (d.success_deals||0)/total*100 : 0) + '%';
        document.getElementById('bar_rejected').style.width = (total ? (d.rejected_deals||0)/total*100 : 0) + '%';
    }, 300);
    
    // Последние рекомендации (пример)
    const list = document.getElementById('activityList');
    list.innerHTML = d.leads && d.leads.length 
        ? d.leads.slice(0,5).map(l => `<div style="background:var(--surface);padding:16px;border-radius:20px;margin-bottom:12px;">${l.client_name} — ${l.status}</div>`).join('')
        : `<div class="empty">Пока нет рекомендаций</div>`;
}

// Заглушка для твоих функций (замени на свои)
function animNum(id, value) {
    const el = document.getElementById(id);
    if (el) el.textContent = value;
}
function loadCatalog() { console.log('Каталог открыт'); }

// Запуск
window.onload = function() {
    // Здесь твой настоящий fetch по токену
    // dashData = await fetch... 
    // renderAll();
    console.log('%c✅ Dashboard loaded (clean version)', 'color:#56CCF2;font-weight:800');
};
</script>

</body>
</html>
